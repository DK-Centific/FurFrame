/* =====================================================================
   REVIEW BEFORE SUBMIT
   ===================================================================== */
function openReview() {
  const si = state.checklist.sessionInfo;
  const missingInfo = ['participantName','ndaSigned','vaccinationChecked'].filter(k => !si[k]);
  const r = rollup();
  const fails = collectFailItems();

  let bodyHtml = '';
  if (missingInfo.length) {
    bodyHtml += '<div style="background:var(--red-bg);color:var(--red-text);padding:11px 13px;border-radius:12px;font-size:13px;margin-bottom:14px;">' +
      'Session info is incomplete: ' + missingInfo.length + ' field(s) still blank. Complete them before submitting.</div>';
  }
  bodyHtml += '<div class="rollup" style="margin-bottom:14px;">' + rollupChipsHTML(r) + '</div>';
  if (fails.length) {
    bodyHtml += '<div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--red-text);margin-bottom:8px;">' +
      fails.length + ' fail item(s)</div><div class="fail-list">' +
      fails.map(f => '<div class="fi"><span class="tag">' + escapeHTML(f.tag) + '</span><span>' + escapeHTML(f.text) + '</span></div>').join('') +
      '</div>';
  } else {
    bodyHtml += '<div style="font-size:13px;color:var(--text2);">No fail items. ' + (r.review ? r.review + ' item(s) still need review.' : 'All reviewed items pass.') + '</div>';
  }

  const canSubmit = missingInfo.length === 0;
  const actions = canSubmit
    ? [{ label:'Submit checklist', kind:'primary', onClick: submitChecklist }, { label:'Keep editing', kind:'ghost' }]
    : [{ label:'Complete session info', kind:'primary', onClick: () => gotoSection('info') }, { label:'Close', kind:'ghost' }];

  showModal({ title:'Review before submit', bodyHtml, actions });
}
function collectFailItems() {
  const out = [];
  TASKS.forEach(t => { if (taskQC(t.id)==='fail') out.push({ tag:'B-'+String(t.id).padStart(2,'0'), text:t.name }); });
  NP_RECS.forEach(rec => { if (npQC(rec.id)==='fail') out.push({ tag:'C-'+rec.id, text:'No-person · ' + rec.lux + (state.checklist.C[rec.id].humanFov==='yes'?' (human in FOV)':'') }); });
  SECTION_D.forEach(it => { if (simpleQC('D', it.id)==='fail') out.push({ tag:'D-'+it.id, text:it.name }); });
  SECTION_E.forEach(it => { if (simpleQC('E', it.id)==='fail') out.push({ tag:'E-'+it.id, text:it.name }); });
  return out;
}
function overallQc() {
  const r = rollup();
  if (r.fail > 0) return 'fail';
  if (r.review > 0) return 'review';
  return 'pass';
}

function buildSavePayload(si, oqc, r) {
  const detail = { sessionInfo: si, B: state.checklist.B, C: state.checklist.C, D: state.checklist.D, E: state.checklist.E };
  const fails = collectFailItems().map(f => ({ tag: f.tag, text: f.text }));
  return {
    sessionId: 's_' + Date.now(),
    submittedAt: new Date().toISOString(),
    tpmReviewer: state.userProfile.name,
    moderatorName: state.userProfile.name,
    participantId: si.participantId,
    participantName: si.participantName,
    location: si.location || 'Redmond',
    sessionDate: ymd(new Date()),
    ndaSigned: si.ndaSigned === 'yes' ? 'Yes' : 'No',
    vaccinationChecked: si.vaccinationChecked === 'yes' ? 'Yes' : 'No',
    furryName: si.furryName,
    furryType: si.furryType,
    overallQc: oqc,
    passCount: String(r.pass),
    reviewCount: String(r.review),
    failCount: String(r.fail),
    uploadsConfirmed: String(uploadsConfirmed()),
    failsJson: JSON.stringify(fails),
    feedbackJson: '[]',
    detailJson: JSON.stringify(detail),
  };
}
function submitChecklist() {
  const si = state.checklist.sessionInfo;
  const oqc = overallQc();
  const r = rollup();
  if (MOCK_MODE) {
    // In the demo, push a summarized session into the in-memory dashboard list.
    MOCK_SESSIONS.unshift({
      sessionId: 's_' + Date.now(),
      tpmReviewer: state.userProfile.name,
      moderatorName: state.userProfile.name, participantId: si.participantId, participantName: si.participantName, location: si.location || 'Redmond',
      sessionDate: ymd(new Date()), ndaSigned: si.ndaSigned==='yes'?'Yes':'No', vaccinationChecked: si.vaccinationChecked==='yes'?'Yes':'No',
      furryName: si.furryName, furryType: si.furryType,
      overallQc: oqc, passCount:r.pass, reviewCount:r.review, failCount:r.fail,
      uploadsConfirmed: uploadsConfirmed(), fails: collectFailItems().map(f => ({ tag:f.tag, text:f.text })),
    });
    showToast('Checklist submitted (' + oqc.toUpperCase() + ') — demo mode, stored locally', 'success', 3600);
    state.checklist = blankChecklist();
    state.section = 'info';
    clearProgress(state.username);   // clears local + pushes the blank draft to cloud
    render();
    return;
  }
  // Production: append one row to the Sessions table via the Save flow.
  const payload = buildSavePayload(si, oqc, r);
  showToast('Submitting\u2026', 'info', 2000);
  paFetch(SAVE_PA_URL, payload, { retries: 2, timeoutMs: 20000 }).then(res => {
    const ok = res.ok && (!res.json || res.json.ok !== false);
    if (ok) {
      showToast('Checklist submitted (' + oqc.toUpperCase() + ')', 'success', 3600);
      state.checklist = blankChecklist();
      state.section = 'info';
      clearProgress(state.username);   // clears local + pushes the blank draft to cloud
      _sessionsState.loaded = false;     // My Sessions will reload next time it opens
      render();
      loadSessions(true);                // refresh the cache in the background
    } else {
      showToast('Save failed \u2014 nothing was lost. Tap Submit to try again.', 'error', 4200);
    }
  });
}

/* =====================================================================
   MY SUBMISSIONS (TPM) — reuses the dashboard session list, filtered to self
   ===================================================================== */
let msFilters = { week: 'all', pet: 'all' };
function mondayOf(d) { const x = new Date(d.getFullYear(), d.getMonth(), d.getDate()); const day = (x.getDay()+6)%7; x.setDate(x.getDate()-day); return x; }
function setMsFilter(group, val) { msFilters[group] = val; renderSubmissions(); }
function filterMySessions(rows) {
  const thisMon = mondayOf(new Date()).getTime();
  const lastMon = thisMon - 7*86400*1000;
  return rows.filter(s => {
    if (msFilters.pet !== 'all' && (s.furryType || '') !== msFilters.pet) return false;
    if (msFilters.week !== 'all') {
      const t = parseTsToEpoch(s.sessionDate);
      if (msFilters.week === 'this' && t < thisMon) return false;
      if (msFilters.week === 'last' && !(t >= lastMon && t < thisMon)) return false;
    }
    return true;
  });
}
function renderSubmissions() {
  const mine = filterMySessions(getSessions().filter(s => s.tpmReviewer === state.userProfile.name));
  const list = mine.length
    ? '<div class="ms-head"><span class="ms-col-part">Participant</span><span class="ms-col-pet">Furry friend</span><span class="ms-col-stat">QA Status</span></div>' + mine.map(msRowHTML).join('')
    : '<div class="empty">No sessions match these filters.</div>';
  $('root').innerHTML = navHTML() +
    '<div class="app-shell" style="padding-top:22px;padding-bottom:60px;">' +
      '<div class="panel-head" style="margin-bottom:16px;"><div class="panel-title">My Sessions</div>' +
      '<div class="panel-sub">Checklists you have submitted. Filter by week or by your furry friend\u2019s type.</div></div>' +
      msFilterBarHTML() + list +
    '</div>';
}
function msFilterBarHTML() {
  const chip = (group, val, label, icon) => '<button class="fchip ' + (msFilters[group]===val?'sel':'') + '" onclick="setMsFilter(\'' + group + '\',\'' + val + '\')">' + (icon||'') + escapeHTML(label) + '</button>';
  return '<div class="ms-filters">' +
    chip('week','all','All') + chip('week','this','This week') + chip('week','last','Last week') +

    chip('pet','all','All pets') + chip('pet','Dog','Dog', svgPaw()) + chip('pet','Cat','Cat', svgPaw()) +

}
function msRowHTML(s) {

    ? '<span class="ms-petname">' + escapeHTML(s.furryName) + '</span>' + (s.furryType ? '<span class="type-pill">' + svgPaw() + escapeHTML(s.furryType) + '</span>' : '')

/* ---- Dashboard tab: program overview (all data; filters live on the Moderators tab) ---- */
function dashboardInnerHTML() {
  const rows = filteredSessions();
  const reviewed = rows.length;
  const passes = rows.filter(s => s.overallQc==='pass').length;
  const passRate = reviewed ? Math.round((passes/reviewed)*100) : 0;
  const withFail = rows.filter(s => s.failCount > 0).length;
  const upConf = rows.reduce((a,s)=>a+s.uploadsConfirmed,0);
  const upExp = reviewed * TOTAL_UPLOAD_ROWS;
  const upPct = upExp ? Math.round((upConf/upExp)*100) : 0;
  const qc = qcCounts(rows);
  const mc = {}; rows.forEach(s => { mc[s.moderatorName] = (mc[s.moderatorName]||0)+1; });

function complianceTileHTML(rows) {

  else if (pct >= 95)   { st = { c:'ok',   t:'All compliant',   d:'up'   }; fillVar = 'var(--green)'; }
  else if (pct >= 80)   { st = { c:'warn', t:'Minor gaps',      d:'flat' }; fillVar = 'var(--amber)'; }

    '<div style="font-size:11.5px;color:var(--text2);margin-top:8px;">NDA signed + vaccination confirmed</div></div>';

function donutSVG(c) {
  const total = c.pass + c.review + c.fail;
  const r = 52, cx = 65, cy = 65, circ = 2 * Math.PI * r;
  const seg = (n) => total ? (n/total)*circ : 0;
  const ring = (len, v, off) => '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke-width="16" style="stroke:' + v + ';" stroke-dasharray="' + len.toFixed(1) + ' ' + circ.toFixed(1) + '" stroke-dashoffset="' + (-off).toFixed(1) + '" transform="rotate(-90 ' + cx + ' ' + cy + ')"></circle>';
  let svg = '<svg class="donut" viewBox="0 0 130 130" preserveAspectRatio="xMidYMid meet" role="img" aria-label="QC outcomes: ' + c.pass + ' pass, ' + c.review + ' review, ' + c.fail + ' fail">' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke-width="16" style="stroke:var(--bg4);"></circle>';
  if (total) {
    const pP = seg(c.pass), pR = seg(c.review), pF = seg(c.fail);
    svg += ring(pP, 'var(--green)', 0) + ring(pR, 'var(--amber)', pP) + ring(pF, 'var(--red)', pP + pR);
  }
  svg += '<text x="' + cx + '" y="' + cy + '" text-anchor="middle" dominant-baseline="central" style="fill:var(--text);font-family:var(--font-num);font-weight:300;" font-size="26">' + total + '</text></svg>';
  return svg;
}
function barChartHTML(pairs) {
  if (!pairs.length) return '<div style="color:var(--text3);font-size:12.5px;">No data yet.</div>';
  const max = Math.max.apply(null, pairs.map(p=>p[1]).concat([1]));
  return pairs.map(p => {
    const w = Math.round((p[1]/max)*100);
    return '<div class="bar-row"><div class="bar-head"><span>' + escapeHTML(p[0]) + '</span><b>' + p[1] + '</b></div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + w + '%"></div></div></div>';
  }).join('');
}
function progressByDate(rows) {
  rows = rows || getSessions();
  const byDate = {};
  rows.forEach(s => { byDate[s.sessionDate] = (byDate[s.sessionDate]||0) + 1; });
  const dates = Object.keys(byDate).sort((a,b)=>parseTsToEpoch(a)-parseTsToEpoch(b));
  let cum = 0;
  return dates.map(d => { cum += byDate[d]; return { label: d.slice(5), value: cum }; });   // mm-dd, cumulative reviewed
}
function lineChartSVG(points) {
  if (!points.length) return '<div style="color:var(--text3);font-size:12.5px;">No data yet.</div>';
  const W = 640, H = 220, padL = 32, padR = 16, padT = 16, padB = 30;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const maxV = Math.max(1, Math.ceil(Math.max.apply(null, points.map(p=>p.value))));
  const n = points.length;
  const x = (i) => padL + (n === 1 ? innerW/2 : innerW * (i/(n-1)));
  const y = (v) => padT + innerH * (1 - v/maxV);
  const steps = Math.min(maxV, 4);
  let grid = '';
  for (let g = 0; g <= steps; g++) {
    const val = Math.round(maxV * g / steps), gy = y(val);
    grid += '<line class="lc-grid" x1="' + padL + '" y1="' + gy.toFixed(1) + '" x2="' + (W-padR) + '" y2="' + gy.toFixed(1) + '"></line>';
    grid += '<text class="lc-lbl" x="' + (padL-6) + '" y="' + (gy+3).toFixed(1) + '" text-anchor="end">' + val + '</text>';
  }
  const linePath = points.map((p,i)=>(i===0?'M':'L') + x(i).toFixed(1) + ' ' + y(p.value).toFixed(1)).join(' ');
  const areaPath = 'M' + x(0).toFixed(1) + ' ' + y(0).toFixed(1) + ' ' +
    points.map((p,i)=>'L' + x(i).toFixed(1) + ' ' + y(p.value).toFixed(1)).join(' ') +
    ' L' + x(n-1).toFixed(1) + ' ' + y(0).toFixed(1) + ' Z';
  let dots = '', xlabels = '';
  points.forEach((p,i) => {
    const px = x(i), py = y(p.value);
    dots += '<circle class="lc-dot" cx="' + px.toFixed(1) + '" cy="' + py.toFixed(1) + '" r="3.5"></circle>';
    dots += '<text class="lc-val" x="' + px.toFixed(1) + '" y="' + (py-9).toFixed(1) + '" text-anchor="middle">' + p.value + '</text>';
    xlabels += '<text class="lc-lbl" x="' + px.toFixed(1) + '" y="' + (H-9) + '" text-anchor="middle">' + escapeHTML(p.label) + '</text>';
  });
  return '<svg class="line-chart" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Cumulative sessions reviewed over time">' +
    grid + '<path class="lc-area" d="' + areaPath + '"></path><path class="lc-line" d="' + linePath + '"></path>' + dots + xlabels + '</svg>';
}

function attachFeedbackHandlers() {
  document.querySelectorAll('#fbDrawer textarea[data-fbkey]').forEach(ta => {
    ta.addEventListener('input', () => {
      const key = ta.getAttribute('data-fbkey');
      fbDraft.comments[key] = ta.value;

function sendFeedback() {
  if (!fbDraft) return;
  const s = getSessions().find(x => String(x.sessionId) === String(fbDraft.sessionId));
  if (!s) { closeFeedbackDrawer(); return; }
  const items = [];
  Object.keys(fbDraft.comments).forEach(key => {
    const txt = (fbDraft.comments[key] || '').trim();
    if (txt) items.push({ key: key, tag: key, comment: txt });
  });
  if (!items.length) { showToast('Add at least one comment before sending.', 'error'); return; }
  const reveal = () => { const el = $('sd_' + s.sessionId); if (el) el.classList.add('open'); };
  if (MOCK_MODE) {
    s.qaFeedback = items;
    closeFeedbackDrawer();
    render(); reveal();
    showToast('Feedback sent \u2014 ' + items.length + ' comment' + (items.length>1?'s':''), 'success');
    return;
  }
  // Production: persist to the Sessions row via the Feedback flow.
  showToast('Sending feedback\u2026', 'info', 2000);
  paFetch(FEEDBACK_PA_URL, { sessionId: s.sessionId, feedbackJson: JSON.stringify(items) }, { retries: 2, timeoutMs: 20000 }).then(res => {
    const ok = res.ok && (!res.json || res.json.ok !== false);
    if (ok) {
      s.qaFeedback = items;                 // update cache so it shows immediately
      closeFeedbackDrawer();
      render(); reveal();
      showToast('Feedback sent \u2014 ' + items.length + ' comment' + (items.length>1?'s':''), 'success');
    } else {
      showToast('Couldn\u2019t send feedback. Try again.', 'error', 4200);
    }
  });
}

/* CSV export (demo). Phase 2 swaps to ExcelJS for a formatted .xlsx. */
function exportCSV() {
  const rows = filteredSessions();
  const head = ['sessionId','sessionDate','tpmReviewer','moderatorName','participantId','participantName','furryName','furryType','ndaSigned','vaccinationChecked','overallQc','passCount','reviewCount','failCount','uploadsConfirmed'];
  const lines = [head.join(',')];
  rows.forEach(s => {
    lines.push(head.map(k => '"' + String(s[k]==null?'':s[k]).replace(/"/g,'""') + '"').join(','));
  });
  const blob = new Blob([lines.join('\n')], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'furframe_sessions_' + ymd(new Date()) + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Exported ' + rows.length + ' session(s) to CSV', 'success');
}

  modal.setAttribute('role','dialog'); modal.setAttribute('aria-modal','true');
  const ctr = opts.center ? ' style="text-align:center;"' : '';
  modal.innerHTML = '<button class="modal-close" onclick="closeModal()">×</button>' +
    (opts.iconHtml ? '<div style="margin-bottom:8px;">' + opts.iconHtml + '</div>' : '') +
    '<h3' + ctr + '>' + escapeHTML(opts.title) + '</h3>' +
    '<div style="margin-top:14px;' + (opts.center ? 'text-align:center;' : '') + '">' + opts.bodyHtml + '</div>' +
    '<div class="modal-actions" id="_modalActions"' + (opts.center ? ' style="justify-content:center;"' : '') + '></div>';
  document.body.appendChild(overlay); document.body.appendChild(modal);
  const actWrap = modal.querySelector('#_modalActions');
  (opts.actions||[]).forEach(a => {
    const b = document.createElement('button'); b.className = 'btn btn-' + (a.kind||'primary'); b.textContent = a.label;
    b.onclick = () => { if (!a.keepOpen) closeModal(); if (a.onClick) try { a.onClick(); } catch(e){ console.warn(e); } };
    actWrap.appendChild(b);
  });
  overlay.addEventListener('click', closeModal);
  requestAnimationFrame(() => { overlay.classList.add('open'); modal.classList.add('open'); });
  document.addEventListener('keydown', _modalKey);
}
function _modalKey(e) { if (e.key === 'Escape') closeModal(); }
function closeModal() {
  const o = $('_modalOverlay'), m = $('_modal');
  if (!o && !m) return;
  if (o) o.classList.remove('open'); if (m) m.classList.remove('open');
  document.removeEventListener('keydown', _modalKey);
  setTimeout(() => { if (o) o.remove(); if (m) m.remove(); }, 280);
}
