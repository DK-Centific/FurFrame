  /* QA green accent — vivid Apple green, distinct from the soft "pass" chip */
  --accent:      #EF43B3;
  --accent-dim:  #c4359a;
  --accent-soft: rgba(239,67,179,0.14);
  --accent-ink:  #EF43B3;       /* light theme overrides for contrast on white */

  /* Semantic chips (self-contained pastels — read fine in both themes) */
  --amber: #F59E0B;  --amber-bg: #FFF8EC;  --amber-text: #92400E;
  --green: #22c55e;  --green-bg: #EAF3DE;  --green-text: #27500A;
  --red:   #ef4444;  --red-bg:   #FEF2F2;  --red-text:   #991b1b;
  --blue:  #3b82f6;  --blue-bg:  #EFF6FF;  --blue-text:  #1e3a8a;

  --r:  12px;
  --rl: 18px;

  --font:     -apple-system, 'SF Pro Display', 'SF Pro Text', BlinkMacSystemFont, 'Helvetica Neue', system-ui, sans-serif;
  --font-num: 'Avenir Next', 'Avenir', 'SF Pro Display', -apple-system, sans-serif;
}

[data-theme="dark"] {
  --bg:  #0f0f0e;  --bg2: #1a1a18;  --bg3: #232320;  --bg4: #2d2d29;
  --text:  #F7F5F0;  --text2: #a8a8a0;  --text3: #7a7a72;
  --border:        rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --input-bg: #232320;  --card-bg: #1a1a18;
  --nav-bg:   rgba(15,15,14,0.88);  --sidebar-bg: #1a1a18;
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.4);
  --shadow-md: 0 8px 40px rgba(0,0,0,0.5);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
}
[data-theme="light"] {
  --accent-ink: #c4359a;
  --bg:  #f5f5f7;  --bg2: #ffffff;  --bg3: #fbfbfd;  --bg4: #e8e8ed;
  --text:  #1d1d1f;  --text2: #4a4a4f;  --text3: #8a8a8e;
  --border:        rgba(180,100,160,0.14);
  --border-strong: rgba(150,80,130,0.22);
  --input-bg: #f5f5f7;  --card-bg: #ffffff;
  --nav-bg:   rgba(245,245,247,0.88);  --sidebar-bg: #ffffff;
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-md: 0 8px 40px rgba(0,0,0,0.10);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
}

/* ---- Nav ---- */
nav {
  position: sticky; top: 0; z-index: 200;
  padding-top: env(safe-area-inset-top);
  padding-left: calc(16px + env(safe-area-inset-left));
  padding-right: calc(16px + env(safe-area-inset-right));
  height: calc(52px + env(safe-area-inset-top));
  background: var(--nav-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: flex-end;   /* CRITICAL: keeps icons below the Dynamic Island */
  box-sizing: border-box;
}
.nav-left, .nav-right { height: 52px; display: flex; align-items: center; }
.nav-left  { gap: 12px; flex: 1; min-width: 0; }
.nav-right { gap: 8px; }
.logo { display: flex; align-items: center; gap: 9px; min-width: 0; }
.logo-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.demo-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--accent-ink); background: var(--accent-soft); border: 0.5px solid rgba(239,67,179,0.22); padding: 2px 7px; border-radius: 6px; flex-shrink: 0; }

/* ---- Centific brand block (Kilo / Orbit pattern) ---- */
.brand { display: flex; align-items: center; gap: 10px; min-width: 0; user-select: none; }
.brand-mark {
  width: 28px; height: 28px; flex-shrink: 0;
  background-color: var(--accent);                       /* logo fills with the accent... */
  -webkit-mask: var(--logo-url) center / contain no-repeat;  /* ...via the mark's alpha mask, */
          mask: var(--logo-url) center / contain no-repeat;  /* so it re-tints for any accent */
  filter: drop-shadow(0 1px 3px rgba(239,67,179,0.30));
}
.brand-textwrap { min-width: 0; display: flex; flex-direction: column; }
.brand-text { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.brand-sub { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent-ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.login-mark {
  width: 56px; height: 56px; margin-bottom: 18px;
  background-color: var(--accent);
  -webkit-mask: var(--logo-url) center / contain no-repeat;
          mask: var(--logo-url) center / contain no-repeat;
  filter: drop-shadow(0 6px 18px rgba(239,67,179,0.35));
}
.login-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent-ink); margin: 4px 0 0; }
.ver { font-size: 11px; color: var(--text3); font-family: var(--font-num); }

/* ---- Icon buttons ---- */
.icon-btn {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--bg3); display: flex; align-items: center; justify-content: center;
  color: var(--text2); border: none; cursor: pointer; flex-shrink: 0;
  transition: all 0.18s ease; touch-action: manipulation;
}
.icon-btn:hover  { background: var(--bg4); color: var(--text); }
.icon-btn:active { transform: scale(0.95); }
.icon-btn svg { width: 18px; height: 18px; }
@media (max-width: 760px) { .icon-btn { width: 40px; height: 40px; } }

/* ---- Buttons ---- */
.btn {
  font-family: var(--font); font-size: 15px; font-weight: 500; letter-spacing: -0.01em;
  padding: 10px 16px; border-radius: var(--r); border: 0.5px solid transparent;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer; touch-action: manipulation;
  transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
}
.btn-primary { background: var(--accent); color: #ffffff; border: none; font-weight: 600; }
.btn-primary:hover { background: var(--accent-dim); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(239,67,179,0.40); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary { background: var(--bg2); color: var(--text); border: 0.5px solid var(--border-strong); }
.btn-secondary:hover { background: var(--bg4); }
.btn-ghost { background: transparent; color: var(--text2); border: 0.5px solid var(--border-strong); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-danger { background: transparent; color: var(--red); border: 0.5px solid rgba(239,68,68,0.30); }
.btn-danger:hover { background: rgba(239,68,68,0.10); }
.btn-sm { font-size: 13px; padding: 7px 12px; }

/* ---- Segmented view switch in nav ---- */
.viewswitch { display: flex; gap: 3px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--r); padding: 3px; }
.viewswitch button {
  font-family: var(--font); font-size: 13px; font-weight: 500; color: var(--text2);
  background: transparent; border: none; border-radius: 9px; padding: 5px 12px; cursor: pointer;
  transition: all 0.18s ease; white-space: nowrap;
}
.viewswitch button.active { background: var(--bg2); color: var(--text); font-weight: 600; box-shadow: 0 1px 6px rgba(0,0,0,0.10); }

/* ---- App shell / layout ---- */
.app-shell { --shell-max: 1320px; --shell-padx: 24px; max-width: var(--shell-max); margin: 0 auto; padding: 0 var(--shell-padx); }
@media (max-width: 520px)  { .app-shell { --shell-padx: 14px; } }
@media (min-width: 1920px) { .app-shell { --shell-max: 1480px; --shell-padx: 40px; } }

/* Desktop sidebar base — declared BEFORE the mobile @media so the drawer override wins on small screens */
.sidebar { position: sticky; top: calc(70px + env(safe-area-inset-top)); display: flex; flex-direction: column; gap: 14px; }

.layout { display: grid; grid-template-columns: 290px 1fr; gap: 22px; padding: 22px 0 80px; align-items: start; }
@media (max-width: 880px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; top: calc(52px + env(safe-area-inset-top));
    left: 0; bottom: env(safe-area-inset-bottom);
    width: 86vw; max-width: 320px; z-index: 150;
    transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto; background: var(--sidebar-bg); border-right: 0.5px solid var(--border);
    padding: 16px;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay { position: fixed; inset: 0; z-index: 140; background: rgba(0,0,0,0.45);
    backdrop-filter: saturate(160%) blur(18px); -webkit-backdrop-filter: saturate(160%) blur(18px);
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
  .sidebar-overlay.open { opacity: 1; pointer-events: all; }
  .menu-toggle { display: flex !important; }
}
.menu-toggle { display: none; }

/* ---- Sidebar ---- */
.side-card { background: var(--card-bg); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 14px 16px; box-shadow: var(--shadow-sm); }
.session-name { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
.session-meta { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.5; }
.side-label { font-size: 10.5px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 9px; }

.sec-nav { display: flex; flex-direction: column; gap: 3px; }
.sec-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: 11px;
  cursor: pointer; font-size: 13.5px; color: var(--text2); border: 0.5px solid transparent;
  transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease; user-select: none;
}
.sec-item:hover { background: var(--bg3); color: var(--text); }
.sec-item.active { background: var(--accent-soft); color: var(--text); border-color: rgba(239,67,179,0.35); font-weight: 600; }
.sec-item .sec-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sec-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.sec-dot.not_started { background: var(--bg4); }
.sec-dot.in_progress { background: var(--amber); }
.sec-dot.complete    { background: var(--green); }

/* QC roll-up chips */
.rollup { display: flex; gap: 7px; }
.rchip { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 600; padding: 4px 10px; border-radius: 99px; font-family: var(--font-num); }
.rchip.pass   { background: var(--green-bg); color: var(--green-text); }
.rchip.review { background: var(--amber-bg); color: var(--amber-text); }
.rchip.fail   { background: var(--red-bg);   color: var(--red-text); }
.rchip i { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.rchip.pass i { background: var(--green); } .rchip.review i { background: var(--amber); } .rchip.fail i { background: var(--red); }

.prog-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.prog-row b { font-family: var(--font-num); font-weight: 600; color: var(--text); }
.prog-track { height: 6px; background: var(--bg4); border-radius: 99px; overflow: hidden; }
.prog-fill  { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.35s cubic-bezier(0.4,0,0.2,1); }

/* ---- Main panel ---- */
.main { min-width: 0; }
.panel { background: var(--card-bg); border: 0.5px solid var(--border); border-radius: var(--rl); box-shadow: var(--shadow-sm); padding: 22px 24px; animation: fadeUp 0.3s cubic-bezier(0.4,0,0.2,1); }
@media (max-width: 520px) { .panel { padding: 16px; } }
.panel-head { margin-bottom: 16px; }
.panel-title { font-size: 22px; font-weight: 600; letter-spacing: -0.03em; line-height: 1.15; }
.panel-sub { font-size: 13px; color: var(--text2); margin-top: 5px; line-height: 1.55; letter-spacing: -0.005em; }
.panel-nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 22px; }

/* ---- Item rows ---- */
.item { border: 0.5px solid var(--border); border-radius: var(--r); padding: 13px 15px; margin-bottom: 10px; background: var(--bg2); transition: border-color 0.18s ease; }
[data-theme="light"] .item { background: var(--bg3); }
.item.flag-fail   { border-color: rgba(239,68,68,0.40); }
.item.flag-review { border-color: rgba(245,158,11,0.35); }
.item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.item-id { font-size: 12px; font-weight: 700; color: var(--text3); font-family: var(--font-num); padding-top: 1px; min-width: 26px; }
.item-headtext { flex: 1; min-width: 0; }
.item-name { font-size: 14.5px; font-weight: 600; letter-spacing: -0.015em; }
.item-zone { font-size: 11.5px; color: var(--text3); margin-top: 1px; }
.item-req { font-size: 12.5px; color: var(--text2); margin-top: 4px; line-height: 1.5; }

/* QC chip (derived) */
.qc { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
.qc.pass   { background: var(--green-bg); color: var(--green-text); }
.qc.review { background: var(--amber-bg); color: var(--amber-text); }
.qc.fail   { background: var(--red-bg);   color: var(--red-text); }
.qc.na     { background: var(--bg4);      color: var(--text3); }
.qc .mk { font-weight: 700; }

/* Controls row */
.ctrls { display: flex; flex-wrap: wrap; align-items: center; gap: 14px 18px; margin-top: 11px; }
.ctrl { display: flex; align-items: center; gap: 8px; }
.ctrl-label { font-size: 11.5px; color: var(--text2); font-weight: 500; }

/* Segmented Yes / No / N/A */
.seg { display: inline-flex; border: 0.5px solid var(--border-strong); border-radius: 9px; overflow: hidden; }
.seg button {
  font-family: var(--font); font-size: 11.5px; font-weight: 500; color: var(--text2);
  background: transparent; border: none; padding: 5px 11px; cursor: pointer; touch-action: manipulation;
  border-left: 0.5px solid var(--border); transition: background 0.14s ease, color 0.14s ease;
}
.seg button:first-child { border-left: none; }
.seg button:hover { background: var(--bg3); }
.seg button.on-yes { background: var(--accent); color: #ffffff; font-weight: 600; }
.seg button.on-no  { background: var(--red);    color: #fff; font-weight: 600; }
.seg button.on-na  { background: var(--bg4);    color: var(--text); font-weight: 600; }

/* Upload device chips */
.uploads { display: flex; align-items: center; gap: 6px; }
.dev { font-size: 11.5px; font-weight: 600; padding: 4px 9px; border-radius: 8px; cursor: pointer; user-select: none;
  border: 0.5px solid var(--border-strong); color: var(--text3); background: transparent; touch-action: manipulation; transition: all 0.14s ease; }
.dev.yes { background: var(--green-bg); color: var(--green-text); border-color: rgba(34,197,94,0.30); }
.dev.no  { background: var(--red-bg);   color: var(--red-text);   border-color: rgba(239,68,68,0.30); }

/* Lighting type / select chips for Section C */
.optchips { display: flex; gap: 6px; flex-wrap: wrap; }
.optchip { font-size: 11.5px; font-weight: 500; padding: 5px 11px; border-radius: 8px; cursor: pointer; user-select: none;
  border: 0.5px solid var(--border-strong); color: var(--text2); background: transparent; touch-action: manipulation; transition: all 0.14s ease; }
.optchip.sel { background: var(--accent); color: #ffffff; font-weight: 600; border-color: var(--accent); }

/* Notes */
textarea.notes {
  width: 100%; margin-top: 10px; resize: vertical; min-height: 38px;
  padding: 9px 12px; background: var(--input-bg); border: 0.5px solid var(--border);
  border-radius: var(--r); color: var(--text); font-family: var(--font); font-size: 13px; letter-spacing: -0.005em;
  transition: border-color 0.18s ease, box-shadow 0.18s ease;
}
textarea.notes:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
textarea.notes::placeholder { color: var(--text3); }

/* ---- Reminder (SOP guidance per item) ---- */
.reminder-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--accent-ink);
  background: var(--accent-soft); border: 0.5px solid rgba(239,67,179,0.28); border-radius: 8px; padding: 3px 9px; cursor: pointer;
  margin-top: 6px; touch-action: manipulation; transition: background 0.16s ease; }
.reminder-btn:hover { background: rgba(239,67,179,0.22); }
.reminder-btn svg { width: 13px; height: 13px; }
.reminder-body { display: none; margin-top: 9px; padding: 11px 13px; background: var(--bg3); border: 0.5px solid var(--border); border-left: 2px solid var(--accent); border-radius: 0 var(--r) var(--r) 0; font-size: 12px; color: var(--text2); line-height: 1.55; }
.reminder-body.open { display: block; animation: fadeUp 0.22s ease; }
.reminder-body b { color: var(--text); font-weight: 600; }
.reminder-body .ref-line { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; }
.reminder-body .ref-line span:last-child { color: var(--text); font-family: var(--font-num); }

/* ---- Session info form ---- */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 620px) { .form-grid { grid-template-columns: 1fr; } }
.field label { display: block; font-size: 11.5px; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.01em; }
.field input { width: 100%; padding: 10px 13px; background: var(--input-bg); border: 0.5px solid var(--border); border-radius: var(--r);
  color: var(--text); font-family: var(--font); font-size: 14.5px; transition: border-color 0.18s ease, box-shadow 0.18s ease; }
.field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.field input.err { border-color: var(--red); }
.field.full { grid-column: 1 / -1; }

/* ---- Login ---- */
.login-wrap { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.login-card { width: min(94vw, 400px); background: var(--card-bg); border: 0.5px solid var(--border); border-radius: var(--rl);
  box-shadow: var(--shadow-lg); padding: 32px 28px; position: relative; }
.login-card.shake { animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.login-logo .logo-dot { width: 13px; height: 13px; }
.login-title { font-size: 22px; font-weight: 600; letter-spacing: -0.03em; }
.login-sub { font-size: 13px; color: var(--text2); margin: 8px 0 22px; line-height: 1.5; }
.login-card input { width: 100%; padding: 12px 14px; background: var(--input-bg); border: 0.5px solid var(--border-strong);
  border-radius: var(--r); color: var(--text); font-family: var(--font); font-size: 15px; margin-bottom: 12px;
  transition: border-color 0.18s ease, box-shadow 0.18s ease; }
.login-card input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.login-err { font-size: 12.5px; color: var(--red); min-height: 16px; margin: -4px 0 10px; }

/* Login theme toggle (pick light/dark before signing in) */
.login-theme { position: absolute; top: 14px; right: 14px; display: inline-flex; gap: 2px; padding: 3px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 99px; }
.login-theme button { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 26px; border: none; background: transparent; color: var(--text2); border-radius: 99px; cursor: pointer; transition: background 0.14s ease, color 0.14s ease; }
.login-theme button.on { background: var(--accent); color: #fff; }
.login-theme svg { width: 15px; height: 15px; }

/* Quality-team feedback heading inside an expanded session */
.fb-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent-ink); margin: 14px 0 8px; }
.fb-none { font-size: 12.5px; color: var(--text3); }
.login-hint { font-size: 11.5px; color: var(--text3); margin-top: 16px; line-height: 1.6; }
.login-hint code { background: var(--bg3); padding: 1px 6px; border-radius: 5px; font-family: var(--font-num); color: var(--text2); }

/* ---- Toast ---- */
.toast { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(20px);
  z-index: 999; padding: 12px 20px; background: var(--bg2); border: 0.5px solid var(--border-strong); border-radius: 99px;
  color: var(--text); font-size: 14px; box-shadow: var(--shadow-md); opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease; max-width: 90vw; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.toast-success { border-color: rgba(34,197,94,0.45); }
.toast.toast-error   { border-color: rgba(239,68,68,0.45); }

/* ---- Modal / overlay / drawer ---- */
.overlay { position: fixed; inset: 0; z-index: 700; background: rgba(0,0,0,0.55);
  backdrop-filter: saturate(160%) blur(22px); -webkit-backdrop-filter: saturate(160%) blur(22px);
  opacity: 0; pointer-events: none; transition: opacity 0.28s ease; }
.overlay.open { opacity: 1; pointer-events: all; }
.modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-46%) scale(0.97);
  width: min(94vw, 520px); max-height: 86vh; overflow-y: auto; background: var(--card-bg);
  border: 0.5px solid var(--border); border-radius: 22px; box-shadow: var(--shadow-lg); z-index: 701;
  opacity: 0; pointer-events: none; transition: opacity 0.25s ease, transform 0.32s cubic-bezier(0.32,0.72,0,1); padding: 24px; }
.modal.open { transform: translate(-50%,-50%) scale(1); opacity: 1; pointer-events: all; }
.modal h3 { margin: 0 0 4px; font-size: 19px; font-weight: 600; letter-spacing: -0.02em; }
.modal-close { position: absolute; top: 16px; right: 16px; width: 30px; height: 30px; border-radius: 8px; border: none;
  background: var(--bg3); color: var(--text2); font-size: 18px; cursor: pointer; line-height: 1; }
.modal-close:hover { background: var(--bg4); color: var(--text); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; flex-wrap: wrap; }

/* SOP drawer (right side) */
.drawer { position: fixed; top: 0; right: 0; bottom: 0; z-index: 701; width: min(440px, 92vw); background: var(--bg2);
  border-left: 0.5px solid var(--border); box-shadow: -8px 0 48px rgba(0,0,0,0.30);
  transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  padding: 22px 22px calc(22px + env(safe-area-inset-bottom)); padding-top: calc(20px + env(safe-area-inset-top));
  overflow-y: auto; }
.drawer.open { transform: translateX(0); }
.drawer h3 { margin: 0 0 4px; font-size: 19px; font-weight: 600; letter-spacing: -0.02em; }
.drawer-sub { font-size: 12px; color: var(--text2); margin-bottom: 18px; }
.ref-block { margin-bottom: 20px; }
.ref-block h4 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent-ink); margin: 0 0 9px; }
.ref-tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.ref-tbl td { padding: 6px 8px; border-bottom: 0.5px solid var(--border); color: var(--text2); vertical-align: top; }
.ref-tbl td:first-child { color: var(--text); font-weight: 600; white-space: nowrap; }
.ref-tbl tr:last-child td { border-bottom: none; }

/* Floating help button */
.fab { position: fixed; right: calc(18px + env(safe-area-inset-right)); bottom: calc(18px + env(safe-area-inset-bottom));
  z-index: 600; width: 52px; height: 52px; border-radius: 50%; border: none; background: var(--accent); color: #ffffff;
  box-shadow: 0 8px 28px rgba(239,67,179,0.40); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; touch-action: manipulation; transition: transform 0.2s ease; }
.fab:hover { transform: translateY(-2px) scale(1.04); }
.fab:active { transform: scale(0.95); }

/* ---- Dashboard ---- */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
@media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 460px) { .kpi-grid { grid-template-columns: 1fr; } }
.kpi { background: var(--card-bg); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 18px 20px; box-shadow: var(--shadow-sm); animation: chartIn 0.45s cubic-bezier(0.22,1,0.36,1) backwards; transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), box-shadow 0.25s ease; }
.kpi:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); }
.kpi-num { font-family: var(--font-num); font-weight: 300; font-size: 44px; line-height: 1.1; margin-top: 6px; letter-spacing: -0.02em; }
.kpi-num.green { color: var(--green); } .kpi-num.red { color: var(--red); } .kpi-num.accent { color: var(--accent-ink); }
.kpi-foot { font-size: 11.5px; color: var(--text2); margin-top: 4px; }

.toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
.toolbar select { padding: 8px 12px; background: var(--input-bg); border: 0.5px solid var(--border-strong); border-radius: var(--r);
  color: var(--text); font-family: var(--font); font-size: 13px; cursor: pointer; }
.toolbar .spacer { flex: 1; }

.sess-row { background: var(--card-bg); border: 0.5px solid var(--border); border-radius: var(--r); margin-bottom: 9px; overflow: hidden; }
.sess-head { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; user-select: none; }
.sess-head:hover { background: var(--bg3); }
.sess-pname { font-size: 14.5px; font-weight: 600; }
.sess-meta { font-size: 12px; color: var(--text2); margin-top: 1px; }
.sess-grow { flex: 1; min-width: 0; }
.sess-detail { display: none; padding: 4px 16px 16px; border-top: 0.5px solid var(--border); font-size: 13px; color: var(--text2); line-height: 1.6; }
.sess-detail.open { display: block; animation: detailIn 0.28s cubic-bezier(0.32,0.72,0,1); }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-top: 10px; }
.detail-cell { background: var(--bg3); border-radius: 10px; padding: 9px 12px; }
.detail-cell .dl { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); }
.detail-cell .dv { font-size: 13.5px; color: var(--text); font-weight: 500; margin-top: 2px; }
.fail-list { margin-top: 10px; }
.fail-list .fi { display: flex; gap: 8px; align-items: baseline; padding: 4px 0; }
.fail-list .fi .tag { font-size: 11px; font-weight: 700; color: var(--red); }

.empty { text-align: center; padding: 50px 20px; color: var(--text2); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-7px); } 40%,80% { transform: translateX(7px); } }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Welcome modal mark ---- */
.welcome-mark {
  width: 46px; height: 46px; margin: 0 auto;
  background-color: var(--accent);
  -webkit-mask: var(--logo-url) center / contain no-repeat;
          mask: var(--logo-url) center / contain no-repeat;
  filter: drop-shadow(0 4px 12px rgba(239,67,179,0.35));
}

/* ---- Check-in form: locked location, large green Yes/No, divider, pet fields ---- */
.locked-field { display: flex; align-items: center; gap: 8px; padding: 10px 13px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--r); color: var(--text2); font-size: 14px; }
.locked-field svg { width: 15px; height: 15px; }
.field select { width: 100%; padding: 10px 12px; background: var(--input-bg); border: 0.5px solid var(--border); border-radius: var(--r); color: var(--text); font-family: var(--font); font-size: 14.5px; cursor: pointer; }
.field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.divider { height: 1px; border: none; background: var(--border-strong); opacity: 0.5; margin: 20px 0; }

.bigyn { display: inline-flex; border: 0.5px solid var(--border-strong); border-radius: 11px; overflow: hidden; }
.bigyn button { font-family: var(--font); font-size: 15px; font-weight: 600; color: var(--text2); background: transparent; border: none; padding: 11px 26px; cursor: pointer; border-left: 0.5px solid var(--border); transition: background 0.14s ease, color 0.14s ease; touch-action: manipulation; }
.bigyn button:first-child { border-left: none; }
.bigyn button.on-yes { background: var(--green); color: #06320f; }   /* green Yes per request */
.bigyn button.on-no  { background: var(--bg4);   color: var(--text); }

/* ---- Pet pills (side card + lists) ---- */
.pet-pill { display: flex; align-items: center; gap: 7px; margin-top: 10px; font-size: 13px; }
.pet-pill .pname { font-weight: 600; color: var(--text); }
.type-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 99px; background: var(--blue-bg); color: var(--blue-text); }
.type-pill svg { width: 12px; height: 12px; }

/* ---- Operations reminder (pill table) ---- */
.ops { border: 0.5px solid var(--border); border-radius: var(--r); overflow: hidden; }
.ops-row { display: flex; gap: 12px; align-items: flex-start; padding: 13px 15px; }
.ops-row + .ops-row { border-top: 0.5px solid var(--border); }
.ops-cat { flex-shrink: 0; min-width: 120px; text-align: center; font-size: 11px; font-weight: 600; padding: 3px 11px; border-radius: 99px; letter-spacing: 0.02em; white-space: nowrap; box-sizing: border-box; }
.ops-cat.furniture { background: var(--blue-bg);  color: var(--blue-text); }
.ops-cat.props     { background: var(--green-bg); color: var(--green-text); }
.ops-cat.blind     { background: var(--amber-bg); color: var(--amber-text); }
.ops-cat.feedback  { background: rgba(239,67,179,0.14); color: var(--accent); }
.task-note { margin: 10px 0 2px; font-size: 12.5px; line-height: 1.45; color: var(--text); background: rgba(239,67,179,0.08); border-left: 3px solid var(--accent); border-radius: 8px; padding: 9px 12px; }
.task-note-tag { display: inline-block; font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); margin-right: 8px; vertical-align: 1px; }
.ops-text { font-size: 13px; line-height: 1.55; color: var(--text2); }

/* Admin landing tiles */
.home-hub { max-width: 720px; margin: 0 auto; padding: 52px 20px 48px; }
.home-hub-head { text-align: center; margin-bottom: 30px; }
.home-hub-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
.home-hub-title { font-size: clamp(26px, 4vw, 38px); font-weight: 600; letter-spacing: -0.03em; }
.home-hub-sub { font-size: 14px; color: var(--text2); margin-top: 8px; }
.home-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.home-tile { width: 100%; display: flex; flex-direction: column; gap: 12px; text-align: left; cursor: pointer; background: var(--card-bg); border: 0.5px solid var(--border); border-radius: 20px; padding: 28px 24px; min-height: 196px; box-shadow: var(--shadow-sm); font-family: var(--font); color: var(--text); transition: transform .25s cubic-bezier(.34,1.2,.64,1), box-shadow .25s ease, border-color .25s ease; }
.home-tile:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
.home-tile:active { transform: scale(.99); }
.home-tile-icon { width: 58px; height: 58px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
.home-tile-icon svg { width: 30px; height: 30px; }
.home-tile-icon.pink { background: rgba(239,67,179,0.15); color: var(--accent); }
.home-tile-icon.blue { background: rgba(59,130,246,0.15); color: #3b82f6; }
.home-tile-label { font-size: 21px; font-weight: 600; letter-spacing: -0.02em; }
.home-tile-desc { font-size: 13.5px; color: var(--text2); line-height: 1.5; }
.home-tile-cta { margin-top: auto; font-size: 13px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 5px; }
.home-tile-cta svg { width: 14px; height: 14px; }
@media (max-width: 640px) { .home-tiles { grid-template-columns: 1fr; } .home-hub { padding-top: 40px; } }

/* ---- My Sessions: filters, header, rows ---- */
.ms-filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.ms-sep { width: 1px; align-self: stretch; background: var(--border-strong); margin: 2px 4px; }
.fchip { font-family: var(--font); font-size: 12.5px; font-weight: 500; padding: 6px 13px; border-radius: 99px; border: 0.5px solid var(--border-strong); color: var(--text2); background: transparent; cursor: pointer; transition: all 0.14s ease; touch-action: manipulation; display: inline-flex; align-items: center; gap: 5px; }
.fchip:hover { background: var(--bg3); color: var(--text); }
.fchip.sel { background: var(--accent); color: #fff; border-color: var(--accent); }
.fchip svg { width: 14px; height: 14px; }
.ms-head { display: flex; align-items: center; gap: 12px; padding: 0 16px 8px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); }
.ms-col-part { flex: 1; min-width: 0; }
.ms-col-pet  { width: 168px; }
.ms-col-stat { width: 74px; text-align: right; }
.ms-row-head { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; user-select: none; }
.ms-row-head:hover { background: var(--bg3); }
.ms-row-head .ms-col-pet { display: flex; align-items: center; gap: 7px; }
.ms-part-name { font-size: 14.5px; font-weight: 600; }
.ms-part-meta { font-size: 12px; color: var(--text2); margin-top: 1px; }
.ms-petname { font-size: 13.5px; color: var(--text); }
@media (max-width: 560px) {
  .ms-head { display: none; }
  .ms-row-head { flex-wrap: wrap; }
  .ms-col-part { flex: 1 1 100%; }
  .ms-col-pet  { width: auto; margin-top: 6px; }
  .ms-col-stat { width: auto; margin-left: auto; }
}

/* ---- Admin dashboard: target gauge + charts ---- */
.chart-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
@media (max-width: 820px) { .chart-grid { grid-template-columns: 1fr; } }
.chart-card { background: var(--card-bg); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 16px 18px; box-shadow: var(--shadow-sm); animation: chartIn 0.5s cubic-bezier(0.22,1,0.36,1) backwards; transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), box-shadow 0.25s ease; }
.chart-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.chart-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin-bottom: 12px; }
.target-num { font-family: var(--font-num); font-weight: 300; font-size: 48px; line-height: 1; letter-spacing: -0.02em; }
.target-goal { font-size: 15px; color: var(--text2); }
.target-bar { height: 8px; background: var(--bg4); border-radius: 99px; overflow: hidden; margin: 12px 0 10px; }
.target-fill { height: 100%; border-radius: 99px; transform-origin: left center; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); animation: barGrow 0.8s cubic-bezier(0.22,1,0.36,1) 0.1s both; }
.status-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 3px 11px; border-radius: 99px; }
.status-pill svg { vertical-align: -2px; }
.status-pill.ok   { background: var(--green-bg); color: var(--green-text); }
.status-pill.warn { background: var(--amber-bg); color: var(--amber-text); }
.status-pill.bad  { background: var(--red-bg);   color: var(--red-text); }
.donut-box { display: flex; justify-content: center; align-items: center; padding: 8px 0 2px; }
.donut-box .donut { width: 100%; max-width: 230px; height: auto; }
.donut-legend-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 18px; margin-top: 12px; font-size: 13px; color: var(--text); }
.dleg { display: inline-flex; align-items: center; gap: 7px; }
.dleg i { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
.bar-row { margin-bottom: 14px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-head { display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 5px; }
.bar-head b { font-family: var(--font-num); font-weight: 600; font-size: 15px; color: var(--text); }
.bar-track { height: 12px; background: var(--bg4); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transform-origin: left center; animation: barGrow 0.7s cubic-bezier(0.22,1,0.36,1) 0.15s both; }

/* line chart (progress over time) — full-width tile */
.chart-wide { margin-bottom: 18px; }
.line-chart { width: 100%; height: auto; display: block; margin-top: 4px; }
.line-chart .lc-grid { stroke: var(--border); opacity: 0.5; }
.line-chart .lc-line { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; stroke-dasharray: 900; stroke-dashoffset: 900; animation: lineDraw 1.1s cubic-bezier(0.45,0,0.2,1) 0.2s forwards; }
.line-chart .lc-area { fill: var(--accent); opacity: 0.10; animation: areaIn 0.8s ease 0.5s both; }
.line-chart .lc-dot  { fill: var(--accent); opacity: 0; animation: fadeIn 0.4s ease 0.85s both; }
.line-chart .lc-lbl  { fill: var(--text3); font-size: 10px; font-family: var(--font-num); }
.line-chart .lc-val  { fill: var(--text);  font-size: 11px; font-family: var(--font-num); opacity: 0; animation: fadeIn 0.4s ease 0.95s both; }

/* ---- Representable detail cells ---- */
.vchip { display: inline-flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 600; padding: 3px 10px; border-radius: 99px; margin-top: 5px; }
.vchip.yes { background: var(--green-bg); color: var(--green-text); }
.vchip.no  { background: var(--amber-bg); color: var(--amber-text); }
.vchip svg { width: 13px; height: 13px; }
.prf { display: flex; margin-top: 6px; }
.prf-seg { flex: 1 1 0; text-align: center; min-width: 0; }
.prf-seg b { display: block; font-family: var(--font-num); font-weight: 600; font-size: 16px; line-height: 1.15; }
.prf-seg span { font-size: 10px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--text3); }
.prf-seg b.g { color: var(--green); } .prf-seg b.a { color: var(--amber); } .prf-seg b.r { color: var(--red); }
.up-cell { margin-top: 5px; }
.up-top { display: flex; justify-content: space-between; font-size: 13px; font-weight: 500; }
.up-top .up-pct { color: var(--text2); font-family: var(--font-num); }
.up-track { height: 6px; background: var(--bg4); border-radius: 99px; overflow: hidden; margin-top: 6px; }
.up-fill { height: 100%; background: var(--accent); border-radius: 99px; }
.meta-pet svg { width: 11px; height: 11px; vertical-align: -1px; margin-right: 2px; }

/* ---- Dashboard chart layout: donut beside the line graph ---- */
.chart-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.chart-grid-split { display: grid; grid-template-columns: minmax(260px, 380px) 1fr; gap: 14px; margin-bottom: 18px; }
@media (max-width: 820px) { .chart-grid-2, .chart-grid-split { grid-template-columns: 1fr; } }

/* ---- Apple-style motion: entrance, draw, smooth press ---- */
.donut-box svg { animation: donutIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.12s both; transform-origin: center; }
.kpi-grid .kpi:nth-child(2) { animation-delay: 0.05s; }
.kpi-grid .kpi:nth-child(3) { animation-delay: 0.10s; }
.kpi-grid .kpi:nth-child(4) { animation-delay: 0.15s; }
.chart-grid-2 .chart-card:nth-child(2) { animation-delay: 0.06s; }
.chart-grid-split .chart-card:nth-child(1) { animation-delay: 0.10s; }
.chart-grid-split .chart-card:nth-child(2) { animation-delay: 0.16s; }

.sec-item, .sess-head, .ms-row-head, .bigyn button, .login-theme button {
  transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease,
              transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
}
.btn:active             { transform: scale(0.96); }
.viewswitch button:active { transform: scale(0.96); }
.fchip:active           { transform: scale(0.94); }
.sec-item:active        { transform: scale(0.985); }
.sess-head:active, .ms-row-head:active { transform: scale(0.992); }
.login-theme button:active { transform: scale(0.92); }
.bigyn button:active    { transform: scale(0.96); }

@keyframes chartIn  { from { opacity: 0; transform: translateY(10px) scale(0.985); } to { opacity: 1; transform: none; } }
@keyframes donutIn  { from { opacity: 0; transform: scale(0.82) rotate(-14deg); } to { opacity: 1; transform: scale(1) rotate(0); } }
@keyframes barGrow  { from { transform: scaleX(0); } to { transform: scaleX(1); } }
@keyframes lineDraw { from { stroke-dashoffset: 900; } to { stroke-dashoffset: 0; } }
@keyframes areaIn   { from { opacity: 0; } to { opacity: 0.10; } }
@keyframes detailIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
@keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; animation-delay: 0ms !important; transition-duration: 0.001ms !important; }
  .line-chart .lc-line { stroke-dashoffset: 0 !important; }
}

/* ---- Feedback composer drawer ---- */
.fb-drawer { padding: 0; overflow: hidden; display: flex; flex-direction: column; width: min(440px, 94vw); }
.fb-head { padding: calc(18px + env(safe-area-inset-top)) 20px 14px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.fb-body { flex: 1; overflow-y: auto; padding: 16px 18px; -webkit-overflow-scrolling: touch; }
.fb-foot { display: flex; gap: 10px; padding: 14px 18px calc(14px + env(safe-area-inset-bottom)); border-top: 0.5px solid var(--border); background: var(--bg2); flex-shrink: 0; }
.fb-foot .btn { flex: 1; justify-content: center; }
.fb-acc { border: 0.5px solid var(--border); border-radius: var(--r); margin-bottom: 12px; overflow: hidden; }
.fb-acc-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; font-size: 13.5px; font-weight: 600; background: var(--bg3); user-select: none; }
.fb-acc-head svg { width: 16px; height: 16px; color: var(--text3); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); flex-shrink: 0; }
.fb-acc-head.open svg { transform: rotate(180deg); }
.fb-acc-body { display: none; }
.fb-acc-body.open { display: block; animation: detailIn 0.26s cubic-bezier(0.32,0.72,0,1); }
.fb-task { border-top: 0.5px solid var(--border); }
.fb-task-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 14px; cursor: pointer; user-select: none; }
.fb-task-head:hover { background: var(--bg3); }
.fb-task-name { font-size: 13px; color: var(--text); min-width: 0; }
.fb-tag { font-family: var(--font-num); font-size: 11px; color: var(--text3); margin-right: 9px; }
.fb-cbtn { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 500; padding: 4px 11px; border-radius: 99px; border: 0.5px solid var(--border-strong); color: var(--text2); white-space: nowrap; transition: all 0.16s ease; flex-shrink: 0; }
.fb-cbtn.has { border-color: var(--accent); color: var(--accent-ink); background: var(--accent-soft); }
.fb-comment { display: none; padding: 0 14px 12px; }
.fb-comment.open { display: block; animation: detailIn 0.22s cubic-bezier(0.32,0.72,0,1); }
.fb-ta { width: 100%; min-height: 58px; font-family: var(--font); font-size: 13px; padding: 9px 11px; border-radius: 10px; border: 0.5px solid var(--border-strong); background: var(--input-bg); color: var(--text); resize: vertical; transition: border-color 0.18s ease, box-shadow 0.18s ease; }
.fb-ta:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

/* ---- Orbit-style responsive hardening — nothing clips or overflows on phones ---- */
@media (max-width: 760px) {
  .ver { display: none; }                       /* version chip drops first */
  .viewswitch button { font-size: 12px; padding: 5px 9px; }
  .brand-text { display: none; }              /* keep the shorter eyebrow, drop the long line */
  .panel-title { font-size: 19px; }
}
@media (max-width: 560px) {
  .nav-right { gap: 6px; }
  .demo-tag { display: none; }                  /* keep brand + actions readable */
  .brand-sub { display: none; }
  .viewswitch button { padding: 5px 8px; }
  .ctrls { gap: 12px 14px; }
  .ctrl { flex-wrap: wrap; }                    /* label may sit above its control */
  .seg button { padding: 6px 12px; }            /* larger tap targets, still wrap clean */
  .kpi-num { font-size: clamp(30px, 9vw, 44px); }
  .toolbar select { flex: 1 1 calc(50% - 5px); }/* 2-up selects, no row overflow */
  .ref-tbl td:first-child { white-space: normal; }
  .ref-tbl td { font-size: 12px; padding: 6px 6px; }
}
@media (max-width: 400px) {
  .ctrl { width: 100%; }                        /* one control per line on tiny screens */
  .uploads { flex-wrap: wrap; }
  .toolbar select { flex: 1 1 100%; }
  .panel { padding: 14px; }
}

.hidden { display: none !important; }

/* Stationary participant entry bar (pinned atop sections A–E) */
.fr-entrybar { display: flex; align-items: center; gap: 0; background: var(--card-bg); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 12px 14px; margin-bottom: 18px; box-shadow: var(--shadow-sm); flex-wrap: wrap; scroll-margin-top: 72px; }
.fr-eb-field { padding: 0 14px; }
.fr-eb-field:first-child { padding-left: 4px; }
.fr-eb-label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); }
.fr-eb-val { font-size: 14px; font-weight: 500; color: var(--text); margin-top: 2px; letter-spacing: -0.01em; }
.fr-eb-val.mono { font-family: var(--font-num); }
.fr-eb-div { width: 0.5px; height: 30px; background: var(--border); align-self: center; }
.fr-eb-spacer { flex: 1; min-width: 12px; }
.fr-eb-btn { display: inline-flex; align-items: center; gap: 6px; }
.fr-eb-btn svg { width: 14px; height: 14px; }

/* Photo + OCR scan modal */
.scan-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
.scan-badge.ok { background: var(--green-bg); color: var(--green-text); }
.scan-badge.warn { background: var(--amber-bg); color: var(--amber-text); }
.scan-badge svg { width: 12px; height: 12px; }
.scan-thumb { width: 120px; height: 78px; object-fit: cover; border-radius: var(--r); border: 0.5px solid var(--border); background: var(--bg3); }
.scan-thumb-empty { display: flex; align-items: center; justify-content: center; color: var(--text3); }
.scan-thumb-empty svg { width: 30px; height: 30px; }
.scan-raw { margin-top: 12px; }
.scan-raw summary { font-size: 12px; color: var(--text3); cursor: pointer; }
.scan-raw pre { white-space: pre-wrap; font-size: 11.5px; color: var(--text2); background: var(--bg3); border-radius: var(--r); padding: 10px; margin-top: 8px; max-height: 120px; overflow: auto; }
@media (max-width: 700px) {
  .fr-entrybar { gap: 10px 0; }
  .fr-eb-field { padding: 0 10px; }
}
</style>

<script>
/* =====================================================================
   FURFRAME QUALITY CHECKLIST — DEMO BUILD
   ---------------------------------------------------------------------
   Phase 1 (this build): full UI on in-memory MOCK data. No network.
   Phase 2 (later): wire Power Automate flow URLs; MOCK_MODE flag keeps
   this offline demo path alive for client demos.
   ===================================================================== */

const APP_VERSION = '0.1.061526';   // MAJOR.MINOR.MMDDYY — bump MMDDYY each change
const MOCK_MODE   = false;          // true = in-memory demo; false = call PA flows

/* Power Automate flow URLs (production). */
const LOGIN_PA_URL     = 'https://default9b415834803a4da0afdcfe6b1d52d6.49.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e6021c14ac0e426593953a60b576db92/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=p5Rl0gSpNj5wS30ay7d8pJgZosw7j0BSxsQRdVRcFs4';
const SAVE_PA_URL      = 'https://default9b415834803a4da0afdcfe6b1d52d6.49.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/020cd5a9db194f46b4254c15e567d4e0/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=_rYM7PRuQ321ofeX8d9az_3GMRioDJ8uX4CHThYUDQg';
const DASHBOARD_PA_URL = 'https://default9b415834803a4da0afdcfe6b1d52d6.49.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/5976b5baa95248d280ab44e490966cc0/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=t9ohXeDpyeDrWtqea40SyR8v317h7_8o-mahmeRp3ZQ';
const FEEDBACK_PA_URL  = 'https://default9b415834803a4da0afdcfe6b1d52d6.49.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9ab2c1db04694605bd5ab5bba6c78404/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=ssuKM4cwXTwtl2UGjJz-FAlxy7hB8qz8jkyQ90k_y7c';
/* Participant-ID scan flow (shared with Kilo): Google Vision OCR.
   POST { imageBase64 } -> { text }; we parse the returned text for the PID + name. */
const SCAN_PA_URL = 'https://default9b415834803a4da0afdcfe6b1d52d6.49.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/f2a20969096e4bbaa66906ddebea3d03/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=kBWJCbm7eSF9aba1Ir7KCz0L3aMyNZQLUU2wCM2Y91c';

/* In-progress checklist cloud sync (cross-device). Leave both empty to run
   local-only (localStorage) with no behaviour change. Paste the two flow URLs
   once the SessionDraft table + Save Draft / Get Draft flows exist, and the app
   automatically syncs each reviewer's draft to the cloud and back. */
const DRAFT_SAVE_PA_URL = 'https://default9b415834803a4da0afdcfe6b1d52d6.49.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/02ecb373cc7c484584103602a0ddaeb3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=jSWN4y_MuaAFFSn7hmUEI2cqFIyek7JwH_nLUe-0Tm8';   // POST { loginId, draftJson, updatedAt } -> upsert one row per reviewer

function escapeHTML(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function canonicalize(s) { return String(s || '').trim().toLowerCase(); }
function $(id) { return document.getElementById(id); }
function ymd(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + dd;
}

/* Robust timestamp -> epoch ms. Handles ISO, localized strings, Excel serials. */
function excelSerialToMs(serial) {
  // Excel epoch is 1899-12-30 (accounts for the 1900 leap-year bug).
  const ms = (Number(serial) - 25569) * 86400 * 1000;
  return ms;
}
function parseTsToEpoch(raw) {
  if (raw == null || raw === '') return 0;
  if (typeof raw === 'number' || /^\d+(\.\d+)?$/.test(String(raw).trim())) {
    const n = Number(raw);
    // Excel serials are typically < 100000; epoch ms are huge.
    if (n > 0 && n < 100000) return excelSerialToMs(n);
    if (n > 1e11) return n;            // already epoch ms
    if (n > 1e8)  return n * 1000;     // epoch seconds
  }
  const t = Date.parse(raw);
  return isNaN(t) ? 0 : t;
}

/* fetchWithRetry — used by all PA calls in Phase 2 (resilient to transient failures). */
async function fetchWithRetry(url, opts, retries = 2, backoff = 600) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const res = await fetch(url, opts);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res;
    } catch (e) {
      if (attempt === retries) throw e;
      await new Promise(r => setTimeout(r, backoff * (attempt + 1)));
    }
  }
}

function showToast(message, type, duration) {
  type = type || 'info'; duration = duration || 3000;
  const toast = $('toast');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), duration);
}

/* =====================================================================
   SESSIONS DATA LAYER
   Demo reads MOCK_SESSIONS; production loads from the Get All Sessions flow
   and normalizes the Excel rows into the same shape the views expect.
   ===================================================================== */
let _sessionsState = { loaded: false, loading: false };
function getSessions() { return MOCK_MODE ? MOCK_SESSIONS : (state.sessions || []); }
function viewNeedsSessions() {
  if (!state.userProfile) return false;
  if (state.userProfile.role === 'Admin') return state.view === 'dashboard' || state.view === 'moderators';
  return state.view === 'submissions';                    // moderator: only My Sessions
}
function sessionsArrayFrom(r) {
  const j = r && r.json;
  if (Array.isArray(j)) return j;
  if (j && Array.isArray(j.rows)) return j.rows;
  if (j && Array.isArray(j.value)) return j.value;
  if (j && j.body && Array.isArray(j.body.value)) return j.body.value;
  return [];
}
/* Case/seperator-insensitive column getter (Excel headers vary in casing). */
function field(obj) {
  const names = Array.prototype.slice.call(arguments, 1);
  if (!obj || typeof obj !== 'object') return '';
  const keys = Object.keys(obj);
  for (const want of names) {
    const wn = String(want).toLowerCase().replace(/[^a-z0-9]/g, '');
    for (const k of keys) {
      if (k.toLowerCase().replace(/[^a-z0-9]/g, '') === wn) {
        const v = obj[k]; if (v != null && String(v) !== '') return v;
      }
    }
  }
  return '';
}
function toYmd(v) {
  if (v == null || v === '') return '';
  const s = String(v).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  const e = parseTsToEpoch(s); return e ? ymd(new Date(e)) : s;
}
function normalizeSessionRow(row) {
  const num = v => { const n = Number(String(v).replace(/[^0-9.\-]/g, '')); return isNaN(n) ? 0 : n; };
  const yn = v => { const s = String(v).trim().toLowerCase(); return (s === 'yes' || s === 'true' || s === 'y') ? 'Yes' : (s === '' ? '' : 'No'); };
  const parseJson = (v, fb) => { if (v == null || v === '') return fb; if (typeof v === 'object') return v; try { return JSON.parse(v); } catch (_) { return fb; } };
  return {
    sessionId:        String(field(row, 'SessionId') || ''),
    submittedAt:      field(row, 'SubmittedAt'),
    tpmReviewer:      field(row, 'TpmReviewer', 'Reviewer'),
    moderatorName:    field(row, 'ModeratorName', 'Moderator'),
    participantId:    field(row, 'ParticipantId'),
    participantName:  field(row, 'ParticipantName'),
    location:         field(row, 'Location') || 'Redmond',
    sessionDate:      toYmd(field(row, 'SessionDate')),
    ndaSigned:        yn(field(row, 'NdaSigned')),
    vaccinationChecked: yn(field(row, 'VaccinationChecked')),
    furryName:        field(row, 'FurryName'),
    furryType:        field(row, 'FurryType'),
    overallQc:        String(field(row, 'OverallQc') || 'review').toLowerCase(),
    passCount:        num(field(row, 'PassCount')),
    reviewCount:      num(field(row, 'ReviewCount')),
    failCount:        num(field(row, 'FailCount')),
    uploadsConfirmed: num(field(row, 'UploadsConfirmed')),
    fails:            parseJson(field(row, 'FailsJson'), []),
    qaFeedback:       parseJson(field(row, 'FeedbackJson'), []),
  };
}
/* Fetch + cache all sessions. force=true re-fetches even if already loaded. */
async function loadSessions(force) {
  if (MOCK_MODE) return;
  if (_sessionsState.loading) return;
  _sessionsState.loading = true;
  try {
    const r = await paFetch(DASHBOARD_PA_URL, { action: 'getAll' }, { retries: 2, timeoutMs: 20000 });
    if (r.ok) {
      state.sessions = sessionsArrayFrom(r).map(normalizeSessionRow).filter(s => s.sessionId || s.participantName);
    } else {
      if (!state.sessions) state.sessions = [];
      showToast('Couldn\u2019t load sessions \u2014 check your connection.', 'error', 4000);
    }
  } catch (_) {
    if (!state.sessions) state.sessions = [];
  } finally {
    _sessionsState.loading = false;
    _sessionsState.loaded = true;
    if (viewNeedsSessions()) render();   // only re-render views that show sessions
  }
}

function blankChecklist() {

               B:{}, C:{}, D:{}, E:{} };

  SECTION_D.forEach(it => cl.D[it.id] = { verified:'', notes:'' });
  SECTION_E.forEach(it => cl.E[it.id] = { verified:'', notes:'' });
  return cl;
}
function defaultState() {
  return { username:'', userProfile:null, view:'checklist', section:'info',
           checklist: blankChecklist(), theme:'dark', sessions:null };
}
let state = defaultState();

/* ---- Session persistence: survive a hard refresh (no bounce to login) ----
   We store only the reviewer ID + where they were + theme. On boot we
   re-validate the ID against the directory and restore the view; the
   checklist itself reloads fresh (up-to-date data), not from stale cache. */
const LS_AUTH = 'furframe_auth_v1';
function saveAuth() {
  if (!state.username) return;
  const p = state.userProfile || {};
  try { localStorage.setItem(LS_AUTH, JSON.stringify({ loginId: state.username, name: p.name, role: p.role, location: p.location, view: state.view, section: state.section, theme: state.theme })); } catch (_) {}
}
function clearAuth() { try { localStorage.removeItem(LS_AUTH); } catch (_) {} }

/* =====================================================================
   IN-PROGRESS CHECKLIST PERSISTENCE  (cloud-first, local fallback)
   • Local (localStorage) saves instantly on every change for offline safety
     and zero-latency resume on the same device.
   • Cloud (SessionDraft table via two PA flows) mirrors the draft so a
     moderator can resume on ANY device. Writes are debounced; section
     changes / check-in / submit flush immediately. Reads on sign-in & refresh
     reconcile by timestamp (last write wins).
   • With DRAFT_*_PA_URL empty the cloud paths are no-ops -> pure local mode.
   A successful submit clears both; logout leaves the draft intact.
   ===================================================================== */
const LS_PROGRESS_PREFIX = 'furframe_progress_';
function progressKey(loginId) { return LS_PROGRESS_PREFIX + canonicalize(loginId || state.username); }
function isDraftUser() { return !!(state.username && state.userProfile && state.userProfile.role !== 'Admin'); }
function draftPayload() { return { checklist: state.checklist, section: state.section }; }

function saveProgress() {
  if (!isDraftUser()) return;                       // admins have no checklist
  const stamp = new Date().toISOString();
  try { localStorage.setItem(progressKey(state.username), JSON.stringify({ checklist: state.checklist, section: state.section, updatedAt: stamp })); } catch (_) {}
  scheduleCloudSave();                              // mirror to cloud (debounced)
}
function loadProgress(loginId) {
  try { return JSON.parse(localStorage.getItem(progressKey(loginId)) || 'null'); } catch (_) { return null; }
}
function clearProgress(loginId) {
  try { localStorage.removeItem(progressKey(loginId)); } catch (_) {}
  cloudSaveNow();                                   // push the now-blank draft so cloud doesn't re-restore it
}
/* Merge a saved draft over a fresh blank, so older drafts missing newly-added
   fields (or carrying removed ones) still load cleanly. */
function applyDraft(saved) {
  if (!saved || !saved.checklist) return false;
  const blank = blankChecklist();
  const cl = saved.checklist;
  blank.sessionInfo = Object.assign(blank.sessionInfo, cl.sessionInfo || {});
  ['B','C','D','E'].forEach(sec => {
    if (!cl[sec]) return;
    Object.keys(blank[sec]).forEach(id => { if (cl[sec][id]) blank[sec][id] = Object.assign(blank[sec][id], cl[sec][id]); });
  });
  state.checklist = blank;
  if (saved.section) state.section = saved.section;
  return true;
}
function restoreChecklistFor(loginId) { return applyDraft(loadProgress(loginId)); }

/* ---- Cloud save (debounced upsert) ---- */
const CLOUD_SAVE_DEBOUNCE_MS = 3000;
let _cloudSave = { timer: null, inflight: false, again: false };
function scheduleCloudSave() {
  if (!DRAFT_SAVE_PA_URL || !isDraftUser()) return;
  if (_cloudSave.inflight) { _cloudSave.again = true; return; }
  if (_cloudSave.timer) clearTimeout(_cloudSave.timer);
  _cloudSave.timer = setTimeout(flushCloudSave, CLOUD_SAVE_DEBOUNCE_MS);
}
async function flushCloudSave() {
  _cloudSave.timer = null;
  if (!DRAFT_SAVE_PA_URL || !isDraftUser()) return;
  _cloudSave.inflight = true;
  try {
    await paFetch(DRAFT_SAVE_PA_URL, { loginId: state.username, draftJson: JSON.stringify(draftPayload()), updatedAt: new Date().toISOString() }, { retries: 1, timeoutMs: 15000 });
  } catch (_) {}
  _cloudSave.inflight = false;
  if (_cloudSave.again) { _cloudSave.again = false; scheduleCloudSave(); }
}
/* Flush immediately (section change / check-in / submit) — bypasses the debounce. */
function cloudSaveNow() {
  if (!DRAFT_SAVE_PA_URL || !isDraftUser()) return;
  if (_cloudSave.timer) { clearTimeout(_cloudSave.timer); _cloudSave.timer = null; }
  try { paFetch(DRAFT_SAVE_PA_URL, { loginId: state.username, draftJson: JSON.stringify(draftPayload()), updatedAt: new Date().toISOString() }, { retries: 1, timeoutMs: 15000 }); } catch (_) {}
}

/* ---- Cloud load + reconcile (last write wins by timestamp) ---- */
async function cloudLoadProgress(loginId) {
  if (!DRAFT_LOAD_PA_URL) return null;
  const r = await paFetch(DRAFT_LOAD_PA_URL, { loginId: loginId }, { retries: 1, timeoutMs: 15000 });
  if (!r || !r.ok) return null;
  let row = r.json;
  if (Array.isArray(row)) row = row[0];
  else if (row && Array.isArray(row.value)) row = row.value[0];
  else if (row && Array.isArray(row.rows)) row = row.rows[0];
  if (!row || typeof row !== 'object') return null;
  const draftStr = field(row, 'DraftJson');
  if (!draftStr) return null;
  let draft; try { draft = (typeof draftStr === 'object') ? draftStr : JSON.parse(draftStr); } catch (_) { return null; }
  return { checklist: draft.checklist, section: draft.section, updatedAt: field(row, 'UpdatedAt') || '' };
}
async function reconcileCloudDraft() {
  if (!DRAFT_LOAD_PA_URL || !isDraftUser()) return;
  const who = state.username;
  let cloud; try { cloud = await cloudLoadProgress(who); } catch (_) { return; }
  if (who !== state.username) return;               // user changed while we waited
  if (!cloud || !cloud.checklist) return;
  const local = loadProgress(who);
  const cloudT = parseTsToEpoch(cloud.updatedAt) || 0;
  const localT = (local && local.updatedAt) ? (parseTsToEpoch(local.updatedAt) || 0) : 0;
  if (cloudT > localT) {
    applyDraft(cloud);                              // cloud is newer -> adopt it
    try { localStorage.setItem(progressKey(who), JSON.stringify({ checklist: state.checklist, section: state.section, updatedAt: cloud.updatedAt })); } catch (_) {}
    if (state.userProfile.role !== 'Admin' && state.view === 'checklist') renderChecklistShell();
    showToast('Synced your latest checklist from the cloud', 'success', 2600);
  } else if (localT > cloudT) {
    scheduleCloudSave();                            // local is newer -> push up
  }
}


function restoreAuth() {
  let a; try { a = JSON.parse(localStorage.getItem(LS_AUTH) || 'null'); } catch (_) { a = null; }
  if (!a || !a.loginId) return false;
  let profile;
  if (MOCK_MODE) {
    profile = MOCK_REVIEWERS.find(m => canonicalize(m.loginId) === canonicalize(a.loginId));
    if (!profile) { clearAuth(); return false; }     // unknown ID — fall back to login
  } else {
    // Trust the profile validated at sign-in (avoids bouncing to login on a flaky network).
    profile = { loginId: a.loginId, name: a.name || a.loginId, role: a.role || 'Mod', location: a.location || '' };
  }
  state.username = profile.loginId;
  state.userProfile = profile;
  state.view = a.view || ((profile.role === 'Admin') ? 'home' : 'checklist');
  state.section = a.section || 'info';
  if (a.theme) state.theme = a.theme;
  if (profile.role !== 'Admin') restoreChecklistFor(profile.loginId);   // bring back any in-progress draft
  return true;
}

/* =====================================================================
   QC DERIVATION (auto-derived from the Yes/No checks — per DK's choice)
   Rule: all applicable answers Yes -> pass · any No -> fail ·
         any required answer blank -> review. N/A excluded.
   ===================================================================== */
function deriveQC(answers, opts) {
  opts = opts || {};
  // answers: array of values ('yes' | 'no' | 'na' | '').
  let anyNo = false, anyBlank = false, anyAnswered = false;
  for (const a of answers) {
    if (a === 'na') continue;
    if (a === 'no') { anyNo = true; anyAnswered = true; }
    else if (a === 'yes') { anyAnswered = true; }
    else { anyBlank = true; }
  }
  if (opts.humanFovFail) return 'fail';      // No-Person: human in FOV is an automatic fail
  if (anyNo) return 'fail';
  if (!anyAnswered && anyBlank) return 'untouched';
  if (anyBlank) return 'review';
  return 'pass';
}
function taskQC(taskId) {
  const t = TASKS.find(x => x.id === taskId);
  const r = state.checklist.B[taskId];
  const ans = [r.r1, r.d1, r.d2, r.d3];
  if (!t.lightOnly) ans.push(r.r2);          // Task 0 is Light only — R2 not applicable
  return deriveQC(ans);
}
function npQC(recId) {
  const r = state.checklist.C[recId];
  const humanFovFail = (r.humanFov === 'yes');
  return deriveQC([r.verified, r.d1, r.d2, r.d3], { humanFovFail });
}
function simpleQC(secKey, id) {
  const r = state.checklist[secKey][id];
  return deriveQC([r.verified]);
}
function qcLabel(qc) {
  if (qc === 'pass')   return { cls:'pass',   text:'Pass',   mk:'✓' };
  if (qc === 'review') return { cls:'review', text:'Review', mk:'!' };
  if (qc === 'fail')   return { cls:'fail',   text:'Fail',   mk:'✕' };
  return { cls:'na', text:'—', mk:'' };
}

/* Section status: not_started / in_progress / complete (drives sidebar dots). */
function sectionStatus(secKey) {
  if (secKey === 'info') {
    const si = state.checklist.sessionInfo;
    const req = ['participantName','ndaSigned','vaccinationChecked'];   // location is fixed; furry friend optional
    const filled = req.filter(k => si[k]);
    if (filled.length === 0) return 'not_started';
    if (filled.length === req.length) return 'complete';
    return 'in_progress';
  }
  const rows = collectRowQCs(secKey);
  const touched = rows.filter(q => q !== 'untouched');
  if (touched.length === 0) return 'not_started';
  const done = rows.every(q => q !== 'untouched' && q !== 'review');
  return done ? 'complete' : 'in_progress';
}
function collectRowQCs(secKey) {
  if (secKey === 'B') return TASKS.map(t => taskQC(t.id));
  if (secKey === 'C') return NP_RECS.map(r => npQC(r.id));
  if (secKey === 'D') return SECTION_D.map(it => simpleQC('D', it.id));
  if (secKey === 'E') return SECTION_E.map(it => simpleQC('E', it.id));
  return [];
}

/* Roll-up across the whole checklist (sidebar chips + submit gate). */
function rollup() {
  let pass=0, review=0, fail=0;
  ['B','C','D','E'].forEach(sec => collectRowQCs(sec).forEach(q => {
    if (q === 'pass') pass++; else if (q === 'fail') fail++; else if (q === 'review') review++;
  }));
  return { pass, review, fail };
}
function uploadsConfirmed() {
  // Rows where all three device uploads are Yes (B tasks 0-11 + C NP recs = 18 rows).
  let n = 0;
  TASKS.forEach(t => { const r = state.checklist.B[t.id]; if (r.d1==='yes'&&r.d2==='yes'&&r.d3==='yes') n++; });
  NP_RECS.forEach(rec => { const r = state.checklist.C[rec.id]; if (r.d1==='yes'&&r.d2==='yes'&&r.d3==='yes') n++; });
  return n;
}

   ===================================================================== */
function render() {
  if (!state.username) { renderLogin(); return; }
  if (!MOCK_MODE && viewNeedsSessions() && !_sessionsState.loaded) {
    renderLoadingShell();
    if (!_sessionsState.loading) loadSessions();
    return;
  }
  if (state.userProfile.role === 'Admin') {
    if (state.view === 'home') { renderAdminHome(); return; }
    if (state.view === 'checklist') { renderChecklistShell(); return; }
    (state.view === 'moderators') ? renderModeratorsShell() : renderDashboardShell();
    return;
  }
  renderChecklistShell();

  const inp = $('loginInput');

  setTimeout(() => inp.focus(), 60);

function doLogin() {
  const raw = $('loginInput').value;
  const id = canonicalize(raw);
  if (!id) { loginFail(); return; }
  if (MOCK_MODE) {
    const profile = MOCK_REVIEWERS.find(m => canonicalize(m.loginId) === id);
    if (!profile) { loginFail(); return; }
    completeLogin(profile);
    return;
  }
  // Browsers block secure calls from a local file. Catch it before the call so
  // the message is accurate (not a misleading "ID not recognized").
  if (location.protocol === 'file:') { loginFail(FILE_ORIGIN_MSG); return; }
  // Production: validate against the Login flow.
  loginBusy(true);
  paFetch(LOGIN_PA_URL, { loginId: raw.trim() }, { retries: 1, timeoutMs: 15000 }).then(r => {
    loginBusy(false);
    const j = r && r.json;
    try { console.log('[FurFrame] login \u2190 status', r && r.status, '| ok', r && r.ok, '| body', (j != null ? j : (r && r.text) || '(empty / unreadable)'), r && r.error ? ('| error ' + r.error) : ''); } catch (_) {}
    const notFound  = j && (j.found === false || j.found === 'false');
    // Read profile fields case-insensitively so the flow may return either
    // { found:true, loginId, name, role, location } OR the raw Excel row
    // ({ LoginId, Name, Role, Location, ... }) — both work.
    const loginIdV = field(j, 'loginId');
    const nameV    = field(j, 'name');
    const roleV    = field(j, 'role');
    const locV     = field(j, 'location');
    const hasProfile = !!(roleV || nameV || loginIdV);
    if (r.ok && j && !notFound && (j.found === true || j.found === 'true' || hasProfile)) {
      completeLogin({ loginId: loginIdV || raw.trim(), name: nameV || raw.trim(), role: roleV || 'Mod', location: locV || '' });
    } else if (r.ok && j && (notFound || !hasProfile)) {
      loginFail('Reviewer ID not recognized. Check spelling and try again.');
    } else {
      // No readable response: network, CORS, or an opaque file:// origin.
      loginFail('Couldn\u2019t reach the sign-in service. If you opened the page as a file, host it over http(s) instead.');
    }
  });
}
/* Shown when the page is run from disk (file://) instead of a web server. */
const FILE_ORIGIN_MSG = 'This page is open as a local file, so the browser blocks sign-in. Open it over http(s) \u2014 your GitHub Pages URL, or run "python3 -m http.server" and use http://localhost:8000.';
function loginFail(msg) {
  const card = $('loginCard'); if (card) { card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake'); }
  const e = $('loginErr'); if (e) e.textContent = msg || 'Reviewer ID not recognized. Check spelling and try again.';
}
function loginBusy(b) { const e = $('loginErr'); if (e) e.textContent = b ? 'Signing in\u2026' : ''; }
function completeLogin(profile) {
  state.username = profile.loginId;
  state.userProfile = profile;
  state.view = (profile.role === 'Admin') ? 'home' : 'checklist';
  state.section = 'info';
  state.sessions = null; _sessionsState.loaded = false; _sessionsState.loading = false;
  let resumed = false;
  if (profile.role !== 'Admin') resumed = restoreChecklistFor(profile.loginId);   // pick up any saved draft
  saveAuth();
  render();
  if (profile.role === 'Admin') showToast('Signed in as ' + profile.name, 'success');
  else if (resumed) showToast('Welcome back \u2014 resuming your checklist', 'success', 3200);
  else setTimeout(openWelcome, 360);   // fresh start: greet + offer check-in
  if (profile.role !== 'Admin') reconcileCloudDraft();   // adopt a newer cloud draft if one exists
}

/* =====================================================================
   PARTICIPANT ID — PHOTO + OCR SCAN (Kilo-style)
   Tesseract.js is lazy-loaded from CDN only on first scan, so it never
   weighs down initial load. OCR pre-fills; the TPM confirms before save.
   If the reader can't load, the confirm step still allows manual entry.
   ===================================================================== */
let _scan = null;
let _tesseractPromise = null;
function loadTesseract() {
  if (typeof window !== 'undefined' && window.Tesseract) return Promise.resolve(window.Tesseract);
  if (_tesseractPromise) return _tesseractPromise;
  _tesseractPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.async = true;
    s.onload = () => (window.Tesseract ? resolve(window.Tesseract) : reject(new Error('no global')));
    s.onerror = () => reject(new Error('load failed'));
    document.head.appendChild(s);
    setTimeout(() => { if (!window.Tesseract) reject(new Error('timeout')); }, 20000);
  });
  return _tesseractPromise;
}
/* Participant ID must look like e04c48f6-1d0a-bb04-3741-7h0c4f6d6e06
   (5 groups of 8-4-4-4-12 alphanumerics). The scanner only captures this shape. */
const PID_GROUP = '[0-9a-z]{8}-[0-9a-z]{4}-[0-9a-z]{4}-[0-9a-z]{4}-[0-9a-z]{12}';
const PID_FIND  = new RegExp(PID_GROUP, 'i');
const PID_EXACT = new RegExp('^' + PID_GROUP + '$', 'i');
function isValidPid(v) { return PID_EXACT.test(String(v || '').trim()); }
/* Heuristic parse of OCR text → Participant ID (UUID-style only) + best-guess name. */
function parseIdFromText(text) {
  const raw = (text || '').trim();
  const lines = raw.split(/\n+/).map(l => l.trim()).filter(Boolean);
  let id = '';
  // OCR can split the ID with spaces around hyphens; collapse those first.
  const compact = raw.replace(/\s*-\s*/g, '-');
  const m = compact.match(PID_FIND);
  if (m) id = m[0].toLowerCase();
  let name = '';
  // Registration-dialog form: "Participant <name> assigned PID: <id> …" — the name can be
  // lowercase or contain an underscore (e.g. "david_vid kang"), so capture it directly.
  const sent = raw.match(/participant\s*[:\-]?\s*(.+?)\s+(?:assigned|pid\b|id\b|is\b|=)/i);
  if (sent && sent[1]) {
    const cap = sent[1].replace(/\s+/g, ' ').trim();
    if (cap && cap.length <= 60 && !/^(assigned|pid|id|is|name|full name|the|registration|participant)$/i.test(cap)) name = cap;
  }
  if (!name) name = parseNameFromLines(lines);
  return { id, name, raw };
}
/* Pull a person's full name from OCR lines — first + last, and longer names
   (three or four parts, e.g. "María del Carmen García"). Handles a leading
   "Name:" label, lowercase connectors (de, del, van, von…), Unicode letters,
   and skips header/label lines like "CENTIFIC STUDY" or "ID CARD". */
function parseNameFromLines(lines) {
  const STOP = /\b(id|card|identification|participant|study|centific|official|licen[cs]e|sample|state|class|dob|sex|gender|expires?|issued|address|nationality|country|date|number|no)\b/i;
  const PARTICLES = new Set(['de','del','la','le','van','von','der','den','di','da','dos','das','bin','al','el','mac','mc','san','santa','ben','bint','of','y','e']);
  const clean = lines
    .map(l => l.replace(/^\s*(full\s+name|participant|patient|name|nombre)\s*[:\-]\s*/i, '').trim())
    .filter(Boolean);
  const isNameWord = (w, i) => {
    const lw = w.toLowerCase().replace(/[^a-z]/g, '');
    if (i > 0 && PARTICLES.has(lw)) return true;          // lowercase connector mid-name
    return /^\p{Lu}[\p{L}'\u2019.\-]*$/u.test(w);          // Title-case or ALL-CAPS word
  };
  const cand = clean.filter(l => {
    if (/\d/.test(l) || STOP.test(l) || l.length > 60) return false;
    const words = l.split(/\s+/);
    if (words.length < 2 || words.length > 5) return false; // first + last, up to ~four extra parts
    return words.every((w, i) => isNameWord(w, i));
  });
  const mixed = cand.find(l => /\p{Ll}/u.test(l));          // prefer real mixed-case names over ALL-CAPS headers
  return (mixed || cand[0] || '').replace(/\s+/g, ' ').trim();
}
function openIdScanner() {
  _scan = { phase: 'capture', dataUrl: null, raw: '', id: '', name: '' };
  renderScanModal();

function renderScanModal() {

function scanCaptureHTML() {
