async function onScanFile(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const status = $('scanStatus');
  const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file); });
  _scan.dataUrl = dataUrl;
  if (status) status.textContent = 'Reading the ID\u2026 this can take a few seconds.';
  _scan.raw = ''; _scan.id = ''; _scan.name = '';
  let usedFlow = false;

  // 1) Preferred: the shared Kilo OCR flow (Google Vision via Power Automate).
  //    Contract: POST { imageBase64 } -> { text }. We parse the returned text
  //    for the Participant ID + name (the registration-dialog format).
  if (SCAN_PA_URL) {
    const base64 = String(dataUrl).replace(/^data:[^;]+;base64,/, '');
    const r = await paFetch(SCAN_PA_URL, { imageBase64: base64 }, { retries: 1, timeoutMs: 20000 });
    if (r.ok) {
      const text = ocrTextFrom(r);
      if (text && text.trim()) {
        usedFlow = true;
        _scan.raw = String(text);
        const p = parseIdFromText(_scan.raw);
        _scan.id = p.id; _scan.name = p.name;
      } else if (r.json) {
        // Some flows return parsed fields directly instead of raw text.
        const parsed = extractScanResult(r.json);
        if (parsed.id || parsed.name) { usedFlow = true; _scan.id = parsed.id; _scan.name = parsed.name; }
      }
    } else {
      console.warn('Scan flow error:', r.error);
    }
  }

  // 2) Fallback: on-device OCR (Tesseract.js) only if the flow was unreachable/empty.
  if (!usedFlow) {
    try {
      const T = await loadTesseract();
      const out = await T.recognize(dataUrl, 'eng');
      const p = parseIdFromText(out && out.data && out.data.text || '');
      _scan.raw = p.raw; _scan.id = p.id; _scan.name = p.name;
    } catch (err) {
      console.warn('OCR unavailable:', err);
      showToast('Couldn\u2019t read the ID automatically \u2014 enter it below.', 'error', 3200);
    }
  }
  _scan.phase = 'confirm';
  renderScanModal();
}
/* Resilient PA call (mirrors Kilo's paFetch): POST JSON, tolerate 200/202 and
   empty async bodies, time out, retry once. Never throws — returns {ok,text,json}.
   Content-Type is application/json: PA's HTTP trigger has a Request Body JSON
   Schema, so it rejects other content types (text/plain) with HTTP 400. */
async function paFetch(url, payload, opts) {
  opts = opts || {};
  const retries = opts.retries != null ? opts.retries : 1;
  const timeoutMs = opts.timeoutMs != null ? opts.timeoutMs : 15000;
  for (let attempt = 0; attempt <= retries; attempt++) {
    const controller = (typeof AbortController !== 'undefined') ? new AbortController() : null;
    const timer = controller ? setTimeout(() => controller.abort(), timeoutMs) : null;
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload || {}),
        cache: 'no-store',
        signal: controller ? controller.signal : undefined,
      });
      if (timer) clearTimeout(timer);
      const text = await res.text();
      let json = null; try { json = JSON.parse(text); } catch (_) {}
      if (!res.ok && res.status !== 200 && res.status !== 202) {
        if (attempt === retries) return { ok: false, status: res.status, text: text, json: json, error: 'HTTP ' + res.status };
        await new Promise(r => setTimeout(r, 600 * (attempt + 1)));
        continue;
      }
      return { ok: true, status: res.status, text: text, json: json };
    } catch (err) {
      if (timer) clearTimeout(timer);
      if (attempt === retries) return { ok: false, error: err.message };
      await new Promise(r => setTimeout(r, 600 * (attempt + 1)));
    }
  }
}
/* Pull OCR text out of the flow response, tolerating a few envelope shapes. */
function ocrTextFrom(r) {
  const j = r.json;
  if (j == null) return r.text || '';
  if (typeof j === 'string') return j;
  const t = j.text || j.Text || j.ocrText || j.fullText || j.result || j.body;
  if (typeof t === 'string') return t;
  if (t && typeof t === 'object' && typeof t.text === 'string') return t.text;
  return '';
}
/* Tolerant reader for flows that return parsed fields instead of raw text. */
function extractScanResult(data) {
  let o = data;
  if (o && typeof o === 'object') {
    if (o.body && typeof o.body === 'object') o = o.body;
    else if (o.result && typeof o.result === 'object') o = o.result;
    else if (o.value && typeof o.value === 'object' && !Array.isArray(o.value)) o = o.value;
  }
  const get = (obj, keys) => {
    if (!obj || typeof obj !== 'object') return '';
    for (const want of keys) {
      for (const k of Object.keys(obj)) {
        if (k.toLowerCase().replace(/[^a-z]/g, '') === want) {
          const v = obj[k];
          if (v != null && String(v).trim()) return String(v).trim();
        }
      }
    }
    return '';
  };
  return { id: get(o, ['participantid', 'id', 'pid']), name: get(o, ['participantname', 'name', 'fullname']) };
}

function panelWrap(title, sub, body, nav) {
  return '<div class="panel"><div class="panel-head">' +
    '<div class="panel-title">' + escapeHTML(title) + '</div>' +
    '<div class="panel-sub">' + escapeHTML(sub) + '</div></div>' +
    body + '<div class="panel-nav">' + nav + '</div></div>';
}
function prevNextFor(secKey) {
  const order = ['info','B','C','D','E'];
  const i = order.indexOf(secKey);
  const prev = i > 0 ? '<button class="btn btn-secondary" onclick="gotoSection(\'' + order[i-1] + '\')">← Back</button>' : '<span></span>';
  const gated = (secKey === 'B' || secKey === 'C');
  const nextKey = order[i+1];
  const next = i < order.length-1
    ? '<button class="btn btn-primary" onclick="' + (gated ? 'requireSectionNext(\'' + secKey + '\',\'' + nextKey + '\')' : 'gotoSection(\'' + nextKey + '\')') + '">Next →</button>'
    : '<button class="btn btn-primary" onclick="openReview()">Review &amp; submit</button>';
  return prev + next;
}
/* Sections B and C cannot be left until (1) a Participant ID is on the session
   AND (2) every task/recording in the section has been assessed (no blanks).
   A failed row still counts as assessed — only untouched/partial rows block. */
function requireSectionNext(curKey, nextKey) {
  if (!state.checklist.sessionInfo.participantId) {
    showToast('Add the Participant ID to continue.', 'error');
    openCheckIn();
    return;
  }
  if (sectionStatus(curKey) !== 'complete') {
    showToast('Complete every task in this section before continuing.', 'error');
    return;
  }
  gotoSection(nextKey);
}

function setSeg(sid, v) {
  const parts = sid.split(':'); const secKey = parts[0], id = parts[1], field = parts[2];
  const store = (secKey === 'B' || secKey === 'C') ? state.checklist[secKey][isNaN(id)?id:Number(id)] : state.checklist[secKey][id];
  store[field] = v;

    const bv = txt==='Yes'?'yes':(txt==='No'?'no':'na');
    if (bv === v) btn.classList.add('on-' + v);
  });

  refreshSidebarLive();
  saveProgress();
}

/* Recompute a single row's QC chip + flag class in place. */
function refreshRow(secKey, id) {
  let qc, uid;
  if (secKey === 'B') { qc = taskQC(Number(id)); uid = 'B_' + id; }
  else if (secKey === 'C') { qc = npQC(id); uid = 'C_' + id.replace(/-/g,''); }
  else { qc = simpleQC(secKey, id); uid = secKey + '_' + id; }
  const lab = qcLabel(qc);
  const chip = $('qc_' + uid);
  if (chip) { chip.className = 'qc ' + lab.cls; chip.innerHTML = (lab.mk ? '<span class="mk">' + lab.mk + '</span> ' : '') + lab.text; }
  const row = $('row_' + uid);
  if (row) { row.classList.remove('flag-fail','flag-review'); if (qc==='fail') row.classList.add('flag-fail'); else if (qc==='review') row.classList.add('flag-review'); }
}

/* Update sidebar dots, roll-up chips, progress — all in place (no full rebuild). */
function refreshSidebarLive() {
  SECTIONS.forEach(s => { const dot = $('dot_' + s.key); if (dot) dot.className = 'sec-dot ' + sectionStatus(s.key); });
  const r = rollup(); const rc = $('rollupChips'); if (rc) rc.innerHTML = rollupChipsHTML(r);
  const conf = uploadsConfirmed(); const pct = Math.round((conf / TOTAL_UPLOAD_ROWS) * 100);
  const pt = $('progText'); if (pt) pt.textContent = conf + ' / ' + TOTAL_UPLOAD_ROWS;
  const pf = $('progFill'); if (pf) pf.style.width = pct + '%';
}

/* Uploads — the three capture-device streams. Internal keys stay d1/d2/d3 so
   saved data + QC math are unchanged; only the visible labels are remapped. */
const DEV_LABELS = { d1: 'D2', d2: 'D4 IR mode', d3: 'D4 RGB' };
function uploadsHTML(secKey, id, r) {
  const mk = (dev) => {
    const v = r[dev];
    const cls = v==='yes' ? 'yes' : (v==='no' ? 'no' : '');
    const label = DEV_LABELS[dev] + (v==='yes'?' ✓':(v==='no'?' ✕':''));
    return '<span class="dev ' + cls + '" id="up_' + segId(secKey+':'+id+':'+dev) + '" onclick="cycleUpload(\'' + secKey + '\',\'' + id + '\',\'' + dev + '\')">' + label + '</span>';
  };
  return '<span class="uploads">' + mk('d1') + mk('d2') + mk('d3') + '</span>';
}
function cycleUpload(secKey, id, dev) {
  const store = (secKey==='B') ? state.checklist.B[Number(id)] : state.checklist.C[id];
  const cur = store[dev];
  const next = cur===''?'yes':(cur==='yes'?'no':'');
  store[dev] = next;
  const el = $('up_' + segId(secKey+':'+id+':'+dev));
  if (el) { el.className = 'dev ' + (next==='yes'?'yes':(next==='no'?'no':'')); el.textContent = DEV_LABELS[dev] + (next==='yes'?' ✓':(next==='no'?' ✕':'')); }
  refreshRow(secKey, id);
  refreshSidebarLive();
  saveProgress();
}

/* Notes — bound on input WITHOUT re-render (mobile keyboard guard). */
function notesHTML(secKey, id, val) {
  return '<textarea class="notes" data-notes="' + secKey + '|' + id + '" placeholder="Issues / notes…">' + escapeHTML(val) + '</textarea>';
}
function attachNotesHandlers() {
  document.querySelectorAll('textarea[data-notes]').forEach(ta => {
    ta.addEventListener('input', () => {
      const parts = ta.getAttribute('data-notes').split('|'); const secKey = parts[0], id = parts[1];
      const store = (secKey==='B') ? state.checklist.B[Number(id)] : state.checklist[secKey][id];
      store.notes = ta.value;   // no render — keeps focus / keyboard

      state.checklist.sessionInfo[inp.getAttribute('data-info')] = inp.value;  // no render
    });

}

/* =====================================================================
   REVIEW BEFORE SUBMIT
   ===================================================================== */
function openReview() {
  const si = state.checklist.sessionInfo;
  const missingInfo = ['participantName','ndaSigned','vaccinationChecked'].filter(k => !si[k]);
  const r = rollup();
  const fails = collectFailItems();

  let bodyHtml = '';
  if (missingInfo.length) {
    bodyHtml += '<div style="background:var(--red-bg);color:var(--red-text);padding:11px 13px;border-radius:12px;font-size:13px;margin-bottom:14px;">' +
      'Session info is incomplete: ' + missingInfo.length + ' field(s) still blank. Complete them before submitting.</div>';
  }
  bodyHtml += '<div class="rollup" style="margin-bottom:14px;">' + rollupChipsHTML(r) + '</div>';
  if (fails.length) {
    bodyHtml += '<div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--red-text);margin-bottom:8px;">' +
      fails.length + ' fail item(s)</div><div class="fail-list">' +
      fails.map(f => '<div class="fi"><span class="tag">' + escapeHTML(f.tag) + '</span><span>' + escapeHTML(f.text) + '</span></div>').join('') +
      '</div>';
  } else {
    bodyHtml += '<div style="font-size:13px;color:var(--text2);">No fail items. ' + (r.review ? r.review + ' item(s) still need review.' : 'All reviewed items pass.') + '</div>';
  }

  const canSubmit = missingInfo.length === 0;
  const actions = canSubmit
    ? [{ label:'Submit checklist', kind:'primary', onClick: submitChecklist }, { label:'Keep editing', kind:'ghost' }]
    : [{ label:'Complete session info', kind:'primary', onClick: () => gotoSection('info') }, { label:'Close', kind:'ghost' }];

  showModal({ title:'Review before submit', bodyHtml, actions });
}
function collectFailItems() {
  const out = [];
  TASKS.forEach(t => { if (taskQC(t.id)==='fail') out.push({ tag:'B-'+String(t.id).padStart(2,'0'), text:t.name }); });
  NP_RECS.forEach(rec => { if (npQC(rec.id)==='fail') out.push({ tag:'C-'+rec.id, text:'No-person · ' + rec.lux + (state.checklist.C[rec.id].humanFov==='yes'?' (human in FOV)':'') }); });
  SECTION_D.forEach(it => { if (simpleQC('D', it.id)==='fail') out.push({ tag:'D-'+it.id, text:it.name }); });
  SECTION_E.forEach(it => { if (simpleQC('E', it.id)==='fail') out.push({ tag:'E-'+it.id, text:it.name }); });
  return out;
}
function overallQc() {
  const r = rollup();
  if (r.fail > 0) return 'fail';
  if (r.review > 0) return 'review';
  return 'pass';
}

function buildSavePayload(si, oqc, r) {
  const detail = { sessionInfo: si, B: state.checklist.B, C: state.checklist.C, D: state.checklist.D, E: state.checklist.E };
  const fails = collectFailItems().map(f => ({ tag: f.tag, text: f.text }));
  return {
    sessionId: 's_' + Date.now(),
    submittedAt: new Date().toISOString(),
    tpmReviewer: state.userProfile.name,
    moderatorName: state.userProfile.name,
    participantId: si.participantId,
    participantName: si.participantName,
    location: si.location || 'Redmond',
    sessionDate: ymd(new Date()),
    ndaSigned: si.ndaSigned === 'yes' ? 'Yes' : 'No',
    vaccinationChecked: si.vaccinationChecked === 'yes' ? 'Yes' : 'No',
    furryName: si.furryName,
    furryType: si.furryType,
    overallQc: oqc,
    passCount: String(r.pass),
    reviewCount: String(r.review),
    failCount: String(r.fail),
    uploadsConfirmed: String(uploadsConfirmed()),
    failsJson: JSON.stringify(fails),
    feedbackJson: '[]',
    detailJson: JSON.stringify(detail),
  };
}
function submitChecklist() {
  const si = state.checklist.sessionInfo;
  const oqc = overallQc();
  const r = rollup();
  if (MOCK_MODE) {
    // In the demo, push a summarized session into the in-memory dashboard list.
    MOCK_SESSIONS.unshift({
      sessionId: 's_' + Date.now(),
      tpmReviewer: state.userProfile.name,
      moderatorName: state.userProfile.name, participantId: si.participantId, participantName: si.participantName, location: si.location || 'Redmond',
      sessionDate: ymd(new Date()), ndaSigned: si.ndaSigned==='yes'?'Yes':'No', vaccinationChecked: si.vaccinationChecked==='yes'?'Yes':'No',
      furryName: si.furryName, furryType: si.furryType,
      overallQc: oqc, passCount:r.pass, reviewCount:r.review, failCount:r.fail,
      uploadsConfirmed: uploadsConfirmed(), fails: collectFailItems().map(f => ({ tag:f.tag, text:f.text })),
    });
    showToast('Checklist submitted (' + oqc.toUpperCase() + ') — demo mode, stored locally', 'success', 3600);
    state.checklist = blankChecklist();
    state.section = 'info';
    clearProgress(state.username);   // clears local + pushes the blank draft to cloud
    render();
    return;
  }
  // Production: append one row to the Sessions table via the Save flow.
  const payload = buildSavePayload(si, oqc, r);
  showToast('Submitting\u2026', 'info', 2000);
  paFetch(SAVE_PA_URL, payload, { retries: 2, timeoutMs: 20000 }).then(res => {
    const ok = res.ok && (!res.json || res.json.ok !== false);
    if (ok) {
      showToast('Checklist submitted (' + oqc.toUpperCase() + ')', 'success', 3600);
      state.checklist = blankChecklist();
      state.section = 'info';
      clearProgress(state.username);   // clears local + pushes the blank draft to cloud
      _sessionsState.loaded = false;     // My Sessions will reload next time it opens
      render();
      loadSessions(true);                // refresh the cache in the background
    } else {
      showToast('Save failed \u2014 nothing was lost. Tap Submit to try again.', 'error', 4200);
    }
  });
}

/* =====================================================================
   MY SUBMISSIONS (TPM) — reuses the dashboard session list, filtered to self
   ===================================================================== */
let msFilters = { week: 'all', pet: 'all' };
function mondayOf(d) { const x = new Date(d.getFullYear(), d.getMonth(), d.getDate()); const day = (x.getDay()+6)%7; x.setDate(x.getDate()-day); return x; }
function setMsFilter(group, val) { msFilters[group] = val; renderSubmissions(); }
function filterMySessions(rows) {
  const thisMon = mondayOf(new Date()).getTime();
  const lastMon = thisMon - 7*86400*1000;
  return rows.filter(s => {
    if (msFilters.pet !== 'all' && (s.furryType || '') !== msFilters.pet) return false;
    if (msFilters.week !== 'all') {
      const t = parseTsToEpoch(s.sessionDate);
      if (msFilters.week === 'this' && t < thisMon) return false;
      if (msFilters.week === 'last' && !(t >= lastMon && t < thisMon)) return false;
    }
    return true;
  });
}
function renderSubmissions() {
  const mine = filterMySessions(getSessions().filter(s => s.tpmReviewer === state.userProfile.name));
  const list = mine.length
    ? '<div class="ms-head"><span class="ms-col-part">Participant</span><span class="ms-col-pet">Furry friend</span><span class="ms-col-stat">QA Status</span></div>' + mine.map(msRowHTML).join('')
    : '<div class="empty">No sessions match these filters.</div>';
  $('root').innerHTML = navHTML() +
    '<div class="app-shell" style="padding-top:22px;padding-bottom:60px;">' +
      '<div class="panel-head" style="margin-bottom:16px;"><div class="panel-title">My Sessions</div>' +
      '<div class="panel-sub">Checklists you have submitted. Filter by week or by your furry friend\u2019s type.</div></div>' +
      msFilterBarHTML() + list +
    '</div>';
}
function msFilterBarHTML() {
  const chip = (group, val, label, icon) => '<button class="fchip ' + (msFilters[group]===val?'sel':'') + '" onclick="setMsFilter(\'' + group + '\',\'' + val + '\')">' + (icon||'') + escapeHTML(label) + '</button>';
  return '<div class="ms-filters">' +
    chip('week','all','All') + chip('week','this','This week') + chip('week','last','Last week') +
    '<span class="ms-sep"></span>' +
    chip('pet','all','All pets') + chip('pet','Dog','Dog', svgPaw()) + chip('pet','Cat','Cat', svgPaw()) +
  '</div>';
}
function msRowHTML(s) {
  const lab = qcLabel(s.overallQc);
  const pet = s.furryName
    ? '<span class="ms-petname">' + escapeHTML(s.furryName) + '</span>' + (s.furryType ? '<span class="type-pill">' + svgPaw() + escapeHTML(s.furryType) + '</span>' : '')
    : '<span style="color:var(--text3);font-size:12.5px;">No pet recorded</span>';

  return '<div class="sess-row">' +
    '<div class="ms-row-head" onclick="toggleSess(\'' + s.sessionId + '\')">' +

        '<div class="ms-part-meta">' + escapeHTML(s.sessionDate) + '</div></div>' +
      '<div class="ms-col-pet">' + pet + '</div>' +
      '<div class="ms-col-stat"><span class="qc ' + lab.cls + '">' + (lab.mk ? '<span class="mk">'+lab.mk+'</span> ' : '') + lab.text + '</span></div>' +
    '</div>' +
    '<div class="sess-detail" id="sd_' + s.sessionId + '">' + sessionDetailGridHTML(s) + failBlock + '</div></div>';

let dashFilters = { period:'all', moderator:'all', reviewer:'all' };   // Redmond-only: no location filter
function renderDashboardShell() {
  document.documentElement.setAttribute('data-theme', state.theme);
  $('root').innerHTML = navHTML() +
    '<div class="app-shell" style="padding-top:22px;padding-bottom:60px;" id="dashRoot">' + dashboardInnerHTML() + '</div>';
}
function filteredSessions() {
  let rows = getSessions().slice();
  if (dashFilters.moderator !== 'all') rows = rows.filter(s => s.moderatorName === dashFilters.moderator);
  if (dashFilters.reviewer !== 'all')  rows = rows.filter(s => s.tpmReviewer === dashFilters.reviewer);
  if (dashFilters.period !== 'all') {
    const days = Number(dashFilters.period);
    const cutoff = Date.now() - days*86400*1000;
    rows = rows.filter(s => parseTsToEpoch(s.sessionDate) >= cutoff);
  }
  return rows;
}

/* ---- Dashboard tab: program overview (all data; filters live on the Moderators tab) ---- */
function dashboardInnerHTML() {
  const rows = filteredSessions();
  const reviewed = rows.length;
  const passes = rows.filter(s => s.overallQc==='pass').length;
  const passRate = reviewed ? Math.round((passes/reviewed)*100) : 0;
  const withFail = rows.filter(s => s.failCount > 0).length;
  const upConf = rows.reduce((a,s)=>a+s.uploadsConfirmed,0);
  const upExp = reviewed * TOTAL_UPLOAD_ROWS;
  const upPct = upExp ? Math.round((upConf/upExp)*100) : 0;
  const qc = qcCounts(rows);
  const mc = {}; rows.forEach(s => { mc[s.moderatorName] = (mc[s.moderatorName]||0)+1; });
  const modPairs = Object.keys(mc).map(k => [k, mc[k]]).sort((a,b)=>b[1]-a[1]);

  return filterToolbarHTML(false) +
    '<div class="kpi-grid">' +
      kpi('Sessions reviewed', reviewed, '', '') +
      kpi('Pass rate', passRate + '%', 'green', passes + ' of ' + reviewed + ' passed') +
      kpi('Sessions with a fail', withFail, withFail?'red':'', 'flagged for re-session') +
      kpi('Upload completion', upPct + '%', 'accent', upConf + ' / ' + upExp + ' rows') +
    '</div>' +
    '<div class="chart-grid-2">' +
      complianceTileHTML(rows) +
      '<div class="chart-card"><div class="chart-title">Participants by moderator</div>' + barChartHTML(modPairs) + '</div>' +
    '</div>' +
    '<div class="chart-grid-split">' +
      '<div class="chart-card"><div class="chart-title">QC outcomes</div>' +
        '<div class="donut-box">' + donutSVG(qc) + '</div>' +
        '<div class="donut-legend-row">' +
          '<span class="dleg"><i style="background:var(--green);"></i>Pass · ' + qc.pass + '</span>' +
          '<span class="dleg"><i style="background:var(--amber);"></i>Review · ' + qc.review + '</span>' +
          '<span class="dleg"><i style="background:var(--red);"></i>Fail · ' + qc.fail + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="chart-card"><div class="chart-title">Sessions reviewed over time</div>' + lineChartSVG(progressByDate(rows)) + '</div>' +
    '</div>';
}
function filterToolbarHTML(withExport) {
  const opts = (vals, cur) => ['<option value="all">All</option>'].concat(
    vals.map(v => '<option value="' + escapeHTML(v) + '"' + (cur===v?' selected':'') + '>' + escapeHTML(v) + '</option>')).join('');
  const mods = Array.from(new Set(getSessions().map(s=>s.moderatorName)));
  const revs = Array.from(new Set(getSessions().map(s=>s.tpmReviewer)));
  return '<div class="toolbar">' +
    '<select onchange="setFilter(\'period\',this.value)">' +
      '<option value="all"' + (dashFilters.period==='all'?' selected':'') + '>All dates</option>' +
      '<option value="7"'  + (dashFilters.period==='7'?' selected':'')  + '>Last 7 days</option>' +
      '<option value="30"' + (dashFilters.period==='30'?' selected':'') + '>Last 30 days</option>' +
    '</select>' +
    '<select onchange="setFilter(\'moderator\',this.value)">' + opts(mods, dashFilters.moderator) + '</select>' +

    (withExport ? '<span class="spacer"></span><button class="btn btn-secondary btn-sm" onclick="exportCSV()">Export CSV</button>' : '') +
  '</div>';
}
function kpi(label, num, cls, foot) {
  return '<div class="kpi"><div class="kpi-label">' + escapeHTML(label) + '</div>' +
    '<div class="kpi-num ' + (cls||'') + '">' + escapeHTML(String(num)) + '</div>' +
    (foot ? '<div class="kpi-foot">' + escapeHTML(foot) + '</div>' : '') + '</div>';
}
function qcCounts(rows) {
  return { pass: rows.filter(s=>s.overallQc==='pass').length,
           review: rows.filter(s=>s.overallQc==='review').length,
           fail: rows.filter(s=>s.overallQc==='fail').length };
}
function complianceTileHTML(rows) {
  if (!rows) rows = filteredSessions();
  const reviewed  = rows.length;
  // Compliant = both consent (NDA) and pet vaccination confirmed at check-in.
  const compliant = rows.filter(s => s.ndaSigned === 'Yes' && s.vaccinationChecked === 'Yes').length;
  const pct = reviewed ? Math.round((compliant / reviewed) * 100) : 0;
  let st, fillVar;
  if (!reviewed)        { st = { c:'warn', t:'No sessions yet', d:'flat' }; fillVar = 'var(--amber)'; }
  else if (pct >= 95)   { st = { c:'ok',   t:'All compliant',   d:'up'   }; fillVar = 'var(--green)'; }
  else if (pct >= 80)   { st = { c:'warn', t:'Minor gaps',      d:'flat' }; fillVar = 'var(--amber)'; }
  else                  { st = { c:'bad',  t:'Check consent',   d:'down' }; fillVar = 'var(--red)';   }
  return '<div class="chart-card"><div class="chart-title">Session compliance</div>' +
    '<div style="display:flex;align-items:baseline;gap:6px;"><span class="target-num">' + compliant + '</span><span class="target-goal">/ ' + reviewed + '</span></div>' +
    '<div class="target-bar"><div class="target-fill" style="width:' + pct + '%;background:' + fillVar + ';"></div></div>' +
    '<span class="status-pill ' + st.c + '">' + svgTrend(st.d) + st.t + '</span>' +
    '<div style="font-size:11.5px;color:var(--text2);margin-top:8px;">NDA signed + vaccination confirmed</div></div>';
}
function donutSVG(c) {
  const total = c.pass + c.review + c.fail;
  const r = 52, cx = 65, cy = 65, circ = 2 * Math.PI * r;
  const seg = (n) => total ? (n/total)*circ : 0;
  const ring = (len, v, off) => '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke-width="16" style="stroke:' + v + ';" stroke-dasharray="' + len.toFixed(1) + ' ' + circ.toFixed(1) + '" stroke-dashoffset="' + (-off).toFixed(1) + '" transform="rotate(-90 ' + cx + ' ' + cy + ')"></circle>';
  let svg = '<svg class="donut" viewBox="0 0 130 130" preserveAspectRatio="xMidYMid meet" role="img" aria-label="QC outcomes: ' + c.pass + ' pass, ' + c.review + ' review, ' + c.fail + ' fail">' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke-width="16" style="stroke:var(--bg4);"></circle>';
  if (total) {
    const pP = seg(c.pass), pR = seg(c.review), pF = seg(c.fail);
    svg += ring(pP, 'var(--green)', 0) + ring(pR, 'var(--amber)', pP) + ring(pF, 'var(--red)', pP + pR);
  }
  svg += '<text x="' + cx + '" y="' + cy + '" text-anchor="middle" dominant-baseline="central" style="fill:var(--text);font-family:var(--font-num);font-weight:300;" font-size="26">' + total + '</text></svg>';
  return svg;
}
function barChartHTML(pairs) {
  if (!pairs.length) return '<div style="color:var(--text3);font-size:12.5px;">No data yet.</div>';
  const max = Math.max.apply(null, pairs.map(p=>p[1]).concat([1]));
  return pairs.map(p => {
    const w = Math.round((p[1]/max)*100);
    return '<div class="bar-row"><div class="bar-head"><span>' + escapeHTML(p[0]) + '</span><b>' + p[1] + '</b></div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + w + '%"></div></div></div>';
  }).join('');
}
function progressByDate(rows) {
  rows = rows || getSessions();
  const byDate = {};
  rows.forEach(s => { byDate[s.sessionDate] = (byDate[s.sessionDate]||0) + 1; });
  const dates = Object.keys(byDate).sort((a,b)=>parseTsToEpoch(a)-parseTsToEpoch(b));
  let cum = 0;
  return dates.map(d => { cum += byDate[d]; return { label: d.slice(5), value: cum }; });   // mm-dd, cumulative reviewed
}
function lineChartSVG(points) {
  if (!points.length) return '<div style="color:var(--text3);font-size:12.5px;">No data yet.</div>';
  const W = 640, H = 220, padL = 32, padR = 16, padT = 16, padB = 30;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const maxV = Math.max(1, Math.ceil(Math.max.apply(null, points.map(p=>p.value))));
  const n = points.length;
  const x = (i) => padL + (n === 1 ? innerW/2 : innerW * (i/(n-1)));
  const y = (v) => padT + innerH * (1 - v/maxV);
  const steps = Math.min(maxV, 4);
  let grid = '';
  for (let g = 0; g <= steps; g++) {
    const val = Math.round(maxV * g / steps), gy = y(val);
    grid += '<line class="lc-grid" x1="' + padL + '" y1="' + gy.toFixed(1) + '" x2="' + (W-padR) + '" y2="' + gy.toFixed(1) + '"></line>';
    grid += '<text class="lc-lbl" x="' + (padL-6) + '" y="' + (gy+3).toFixed(1) + '" text-anchor="end">' + val + '</text>';
  }
  const linePath = points.map((p,i)=>(i===0?'M':'L') + x(i).toFixed(1) + ' ' + y(p.value).toFixed(1)).join(' ');
  const areaPath = 'M' + x(0).toFixed(1) + ' ' + y(0).toFixed(1) + ' ' +
    points.map((p,i)=>'L' + x(i).toFixed(1) + ' ' + y(p.value).toFixed(1)).join(' ') +
    ' L' + x(n-1).toFixed(1) + ' ' + y(0).toFixed(1) + ' Z';
  let dots = '', xlabels = '';
  points.forEach((p,i) => {
    const px = x(i), py = y(p.value);
    dots += '<circle class="lc-dot" cx="' + px.toFixed(1) + '" cy="' + py.toFixed(1) + '" r="3.5"></circle>';
    dots += '<text class="lc-val" x="' + px.toFixed(1) + '" y="' + (py-9).toFixed(1) + '" text-anchor="middle">' + p.value + '</text>';
    xlabels += '<text class="lc-lbl" x="' + px.toFixed(1) + '" y="' + (H-9) + '" text-anchor="middle">' + escapeHTML(p.label) + '</text>';
  });
  return '<svg class="line-chart" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Cumulative sessions reviewed over time">' +
    grid + '<path class="lc-area" d="' + areaPath + '"></path><path class="lc-line" d="' + linePath + '"></path>' + dots + xlabels + '</svg>';
}

function dcellHTML(label, html) { return '<div class="detail-cell"><div class="dl">' + escapeHTML(label) + '</div>' + html + '</div>'; }
function dcell(label, val) { return '<div class="detail-cell"><div class="dl">' + escapeHTML(label) + '</div><div class="dv">' + escapeHTML(String(val)) + '</div></div>'; }
function svgCheckSm() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5 9-11"/></svg>'; }
function svgXSm()     { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 6l12 12M18 6L6 18"/></svg>'; }
function svgTrend(dir) {

             : dir==='down' ? '<path d="M3 7l6 6 4-4 7 7"/><path d="M17 16h4v-4"/>'

}
function toggleSess(id) { const el = $('sd_' + id); if (el) el.classList.toggle('open'); }

/* ---- Feedback from Quality Team: items + composer drawer ---- */
function feedbackItemsHTML(s) {
  let html = '<div class="fb-title">Feedback from Quality Team</div>';
  const hasFails = s.fails && s.fails.length;
  const hasQA = s.qaFeedback && s.qaFeedback.length;
  if (!hasFails && !hasQA) return html + '<div class="fb-none">No feedback recorded for this session.</div>';
  if (hasFails) html += '<div class="fail-list">' + s.fails.map(f => '<div class="fi"><span class="tag">' + escapeHTML(f.tag) + '</span><span>' + escapeHTML(f.text) + '</span></div>').join('') + '</div>';
  if (hasQA)    html += '<div class="fail-list">' + s.qaFeedback.map(f => '<div class="fi"><span class="tag">' + escapeHTML(f.tag) + '</span><span>' + escapeHTML(f.comment) + '</span></div>').join('') + '</div>';
  return html;
}

let fbDraft = null;
function openFeedbackDrawer(sessionId) {
  const s = getSessions().find(x => String(x.sessionId) === String(sessionId));
  if (!s) return;
  fbDraft = { sessionId: s.sessionId, comments: {} };
  (s.qaFeedback || []).forEach(f => { fbDraft.comments[f.key] = f.comment; });
  closeFeedbackDrawer(true);
  const ov = document.createElement('div'); ov.className = 'overlay'; ov.id = 'fbOverlay'; ov.onclick = function(){ closeFeedbackDrawer(); };
  const dr = document.createElement('div'); dr.className = 'drawer fb-drawer'; dr.id = 'fbDrawer';
  dr.innerHTML = feedbackDrawerHTML(s);
  document.body.appendChild(ov); document.body.appendChild(dr);
  requestAnimationFrame(() => { ov.classList.add('open'); dr.classList.add('open'); });
  attachFeedbackHandlers();
}
function closeFeedbackDrawer(immediate) {
  const ov = $('fbOverlay'), dr = $('fbDrawer');
  if (immediate) { if (ov) ov.remove(); if (dr) dr.remove(); return; }
  if (ov) ov.classList.remove('open');
  if (dr) dr.classList.remove('open');
  setTimeout(() => { const o = $('fbOverlay'), d = $('fbDrawer'); if (o) o.remove(); if (d) d.remove(); }, 360);
}
function feedbackDrawerHTML(s) {
  const bRows = TASKS.map(t => fbTaskRow('B-' + String(t.id).padStart(2,'0'), t.name)).join('');
  const cRows = NP_RECS.map(r => fbTaskRow('C-' + r.id, 'No-person · ' + r.lux)).join('');
  const pet = s.furryName ? ' \u00b7 ' + escapeHTML(s.furryName) : '';
  return '<button class="modal-close" style="position:absolute;top:16px;right:16px;z-index:2;" onclick="closeFeedbackDrawer()">×</button>' +
    '<div class="fb-head"><h3>Send feedback</h3>' +
      '<div class="drawer-sub">' + escapeHTML(s.participantName || 'Session') + pet + ' \u00b7 comment on any task</div></div>' +
    '<div class="fb-body">' +
      fbGroup('B', 'Section B \u00b7 Task recording log', bRows, true) +
      fbGroup('C', 'Section C \u00b7 No-person task', cRows, false) +
    '</div>' +
    '<div class="fb-foot">' +
      '<button class="btn btn-secondary" onclick="closeFeedbackDrawer()">Cancel</button>' +
      '<button class="btn btn-primary" style="display:inline-flex;align-items:center;justify-content:center;gap:6px;" onclick="sendFeedback()">' + svgSend() + 'Send</button>' +
    '</div>';
}
function fbGroup(id, title, rowsHtml, open) {
  return '<div class="fb-acc" id="fbacc_' + id + '">' +
    '<div class="fb-acc-head' + (open?' open':'') + '" onclick="toggleFbGroup(\'' + id + '\')"><span>' + escapeHTML(title) + '</span>' + svgChevron() + '</div>' +
    '<div class="fb-acc-body' + (open?' open':'') + '">' + rowsHtml + '</div></div>';
}
function fbTaskRow(key, name) {
  const val = fbDraft.comments[key] || '';
  const has = val.trim().length > 0;
  return '<div class="fb-task" id="fbt_' + key + '">' +
    '<div class="fb-task-head" onclick="toggleFbComment(\'' + key + '\')">' +
      '<span class="fb-task-name"><span class="fb-tag">' + escapeHTML(key) + '</span>' + escapeHTML(name) + '</span>' +
      '<span class="fb-cbtn' + (has?' has':'') + '">' + svgMsg() + 'Comment</span>' +
    '</div>' +
    '<div class="fb-comment' + (has?' open':'') + '">' +
      '<textarea class="fb-ta" data-fbkey="' + key + '" placeholder="Add a comment for the moderator\u2026">' + escapeHTML(val) + '</textarea>' +
    '</div></div>';
}
function toggleFbGroup(id) {
  const acc = $('fbacc_' + id); if (!acc) return;
  acc.querySelector('.fb-acc-body').classList.toggle('open');
  acc.querySelector('.fb-acc-head').classList.toggle('open');
}
function toggleFbComment(key) {
  const row = $('fbt_' + key); if (!row) return;
  const c = row.querySelector('.fb-comment');
  const opening = !c.classList.contains('open');
  c.classList.toggle('open');
  if (opening) { const ta = c.querySelector('textarea'); if (ta) setTimeout(() => ta.focus(), 60); }
}
function attachFeedbackHandlers() {
  document.querySelectorAll('#fbDrawer textarea[data-fbkey]').forEach(ta => {
    ta.addEventListener('input', () => {
      const key = ta.getAttribute('data-fbkey');
      fbDraft.comments[key] = ta.value;
      const row = $('fbt_' + key);
      if (row) row.querySelector('.fb-cbtn').classList.toggle('has', ta.value.trim().length > 0);
    });
  });
}
function sendFeedback() {
  if (!fbDraft) return;
  const s = getSessions().find(x => String(x.sessionId) === String(fbDraft.sessionId));
  if (!s) { closeFeedbackDrawer(); return; }
  const items = [];
  Object.keys(fbDraft.comments).forEach(key => {
    const txt = (fbDraft.comments[key] || '').trim();
    if (txt) items.push({ key: key, tag: key, comment: txt });
  });
  if (!items.length) { showToast('Add at least one comment before sending.', 'error'); return; }
  const reveal = () => { const el = $('sd_' + s.sessionId); if (el) el.classList.add('open'); };
  if (MOCK_MODE) {
    s.qaFeedback = items;
    closeFeedbackDrawer();
    render(); reveal();
    showToast('Feedback sent \u2014 ' + items.length + ' comment' + (items.length>1?'s':''), 'success');
    return;
  }
  // Production: persist to the Sessions row via the Feedback flow.
  showToast('Sending feedback\u2026', 'info', 2000);
  paFetch(FEEDBACK_PA_URL, { sessionId: s.sessionId, feedbackJson: JSON.stringify(items) }, { retries: 2, timeoutMs: 20000 }).then(res => {
    const ok = res.ok && (!res.json || res.json.ok !== false);
    if (ok) {
      s.qaFeedback = items;                 // update cache so it shows immediately
      closeFeedbackDrawer();
      render(); reveal();
      showToast('Feedback sent \u2014 ' + items.length + ' comment' + (items.length>1?'s':''), 'success');
    } else {
      showToast('Couldn\u2019t send feedback. Try again.', 'error', 4200);
    }
  });
}
function svgSend()    { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>'; }
function svgMsg()     { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.5 8.5 8.5 0 0 1-3.9-.9L3 20l1.9-4.1A8.5 8.5 0 1 1 21 11.5z"/></svg>'; }
function svgChevron() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>'; }

/* CSV export (demo). Phase 2 swaps to ExcelJS for a formatted .xlsx. */
function exportCSV() {
  const rows = filteredSessions();
  const head = ['sessionId','sessionDate','tpmReviewer','moderatorName','participantId','participantName','furryName','furryType','ndaSigned','vaccinationChecked','overallQc','passCount','reviewCount','failCount','uploadsConfirmed'];
  const lines = [head.join(',')];
  rows.forEach(s => {
    lines.push(head.map(k => '"' + String(s[k]==null?'':s[k]).replace(/"/g,'""') + '"').join(','));
  });
  const blob = new Blob([lines.join('\n')], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'furframe_sessions_' + ymd(new Date()) + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Exported ' + rows.length + ' session(s) to CSV', 'success');
}

/* =====================================================================
   GENERIC MODAL
   ===================================================================== */
function showModal(opts) {
  ['_modalOverlay','_modal'].forEach(id => { const e = $(id); if (e) e.remove(); });
  document.removeEventListener('keydown', _modalKey);
  const overlay = document.createElement('div'); overlay.className = 'overlay'; overlay.id = '_modalOverlay';
  const modal = document.createElement('div'); modal.className = 'modal'; modal.id = '_modal';
  modal.setAttribute('role','dialog'); modal.setAttribute('aria-modal','true');
  const ctr = opts.center ? ' style="text-align:center;"' : '';
  modal.innerHTML = '<button class="modal-close" onclick="closeModal()">×</button>' +
    (opts.iconHtml ? '<div style="margin-bottom:8px;">' + opts.iconHtml + '</div>' : '') +
    '<h3' + ctr + '>' + escapeHTML(opts.title) + '</h3>' +
    '<div style="margin-top:14px;' + (opts.center ? 'text-align:center;' : '') + '">' + opts.bodyHtml + '</div>' +
    '<div class="modal-actions" id="_modalActions"' + (opts.center ? ' style="justify-content:center;"' : '') + '></div>';
  document.body.appendChild(overlay); document.body.appendChild(modal);
  const actWrap = modal.querySelector('#_modalActions');
  (opts.actions||[]).forEach(a => {
    const b = document.createElement('button'); b.className = 'btn btn-' + (a.kind||'primary'); b.textContent = a.label;
    b.onclick = () => { if (!a.keepOpen) closeModal(); if (a.onClick) try { a.onClick(); } catch(e){ console.warn(e); } };
    actWrap.appendChild(b);
  });
  overlay.addEventListener('click', closeModal);
  requestAnimationFrame(() => { overlay.classList.add('open'); modal.classList.add('open'); });
  document.addEventListener('keydown', _modalKey);
}
function _modalKey(e) { if (e.key === 'Escape') closeModal(); }
function closeModal() {
  const o = $('_modalOverlay'), m = $('_modal');
  if (!o && !m) return;
  if (o) o.classList.remove('open'); if (m) m.classList.remove('open');
  document.removeEventListener('keydown', _modalKey);
  setTimeout(() => { if (o) o.remove(); if (m) m.remove(); }, 280);
}
